<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIFE.TRACK</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0a0a0c;
  --surface:  #111115;
  --surface2: #18181f;
  --surface3: #1f1f28;
  --border:  #2a2a35;
  --border2: #35353f;
  --text:  #e8e8f0;
  --text2: #9090a8;
  --text3: #5a5a70;
  --blue:       #3b82f6;
  --blue-dim:   #1e3a5f;
  --blue-glow:  rgba(59,130,246,0.15);
  --gold:       #f59e0b;
  --gold-dim:   #4a3010;
  --gold-glow:  rgba(245,158,11,0.15);
  --slate:      #64748b;
  --slate-dim:  #1e2530;
  --slate-glow: rgba(100,116,139,0.15);
  --green:      #22c55e;
  --green-dim:  #0f3020;
  --green-glow: rgba(34,197,94,0.15);
  --purple:     #a855f7;
  --purple-dim: #2d1a4a;
  --purple-glow:rgba(168,85,247,0.15);
  --panel-w: 400px;
  --radius:  10px;
  --ring-circ: 138.23;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
 
nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,10,12,0.94); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; height: 56px; gap: 10px;
}
.nav-brand { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 0.08em; color: var(--text); flex-shrink: 0; }
.nav-brand span { color: var(--blue); }
.nav-tabs { display: flex; gap: 4px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; flex: 1; }
.nav-tabs::-webkit-scrollbar { display: none; }
.nav-tab { padding: 6px 14px; border-radius: 6px; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 500; color: var(--text2); background: transparent; transition: all 0.18s; white-space: nowrap; flex-shrink: 0; }
.nav-tab:hover { background: var(--surface2); color: var(--text); }
.nav-tab.active { background: var(--surface2); color: var(--text); border: 1px solid var(--border2); }
.nav-settings-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); border-radius: 7px; width: 34px; height: 34px; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
.nav-settings-btn:hover { background: var(--surface3); color: var(--text); }
 
.page { display: none; padding: 24px 20px; max-width: 1100px; margin: 0 auto; }
.page.active { display: block; }
 
.dash-header { margin-bottom: 24px; }
.dash-title { font-family: 'Bebas Neue', sans-serif; font-size: 2.4rem; letter-spacing: 0.06em; line-height: 1; }
.dash-subtitle { color: var(--text3); font-size: 0.82rem; margin-top: 4px; font-family: 'JetBrains Mono', monospace; }
 
.dash-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
 
.stat-card { background: var(--surface); border: 1px solid var(--border); border-top-width: 2px; border-radius: var(--radius); padding: 18px 16px; position: relative; overflow: hidden; transition: border-color 0.2s, transform 0.15s; }
.stat-card:hover { transform: translateY(-1px); }
.stat-label { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.stat-ring-row { display: flex; align-items: center; gap: 12px; }
.ring-wrap { flex-shrink: 0; }
svg.ring { transform: rotate(-90deg); }
.ring-bg { fill: none; stroke: var(--surface3); stroke-width: 5; }
.ring-fill { fill: none; stroke-width: 5; stroke-linecap: round; transition: stroke-dashoffset 0.7s cubic-bezier(.4,0,.2,1); }
 
.stat-pct { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; line-height: 1; letter-spacing: 0.04em; }
.stat-pct.negative { font-size: 1.55rem; }
.stat-detail { font-size: 0.7rem; color: var(--text3); margin-top: 2px; }
.stat-deficit-note { font-size: 0.62rem; color: #f87171; font-family: 'JetBrains Mono', monospace; margin-top: 3px; letter-spacing: 0.04em; }
 
.panel-sort-bar { display: flex; gap: 6px; align-items: center; padding: 8px 18px 0; flex-shrink: 0; }
.panel-sort-label { font-size: 0.65rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; font-family: 'JetBrains Mono', monospace; flex-shrink: 0; margin-right: 2px; }
.sort-pill { font-size: 0.7rem; font-family: 'JetBrains Mono', monospace; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border2); background: transparent; color: var(--text3); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.sort-pill:hover { border-color: var(--text3); color: var(--text2); }
.sort-pill.active { background: var(--blue-dim); border-color: var(--blue); color: var(--blue); }
 
.stat-card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
 
/* ── Flag button — clickable ── */
.stat-flag {
  font-size: 0.85rem; line-height: 1; flex-shrink: 0; margin-left: 4px;
  cursor: pointer;
  background: transparent; border: none; padding: 2px 3px;
  border-radius: 4px;
  transition: background 0.15s, transform 0.1s;
  animation: flag-pulse 2s ease-in-out infinite;
  position: relative;
}
.stat-flag:hover {
  background: rgba(245,158,11,0.15);
  transform: scale(1.2);
  animation: none;
}
.stat-flag.stat-flag-done {
  animation: none;
}
.stat-flag.stat-flag-done:hover {
  background: rgba(34,197,94,0.15);
  transform: scale(1.2);
}
.stat-flag:active { transform: scale(0.95); }
@keyframes flag-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
 
.stat-pct.state-neutral { color: var(--text3); }
.stat-pct.state-red     { color: #f87171; }
.stat-pct.state-amber   { color: var(--gold); }
.stat-pct.state-green   { color: var(--green); }
 
.dash-summary { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; display: flex; gap: 20px; flex-wrap: wrap; align-items: center; }
.sum-item { text-align: center; }
.sum-val { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: var(--text); }
.sum-val.negative { font-size: 1.3rem; color: #f87171; }
.sum-lbl { font-size: 0.7rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; }
.sum-divider { width: 1px; height: 36px; background: var(--border); flex-shrink: 0; }
 
.dash-section-label { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.12em; margin: 20px 0 10px; }
 
.cal-months { display: flex; flex-direction: column; gap: 32px; }
.month-heading { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 0.08em; color: var(--text2); margin-bottom: 12px; display: flex; align-items: baseline; gap: 10px; }
.month-heading span { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--text3); }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.cal-dow { text-align: center; font-size: 0.65rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); padding: 6px 0; }
.cal-day { background: var(--surface); border: 1px solid var(--border); border-radius: 7px; min-height: 56px; padding: 6px; cursor: pointer; transition: border-color 0.15s, background 0.15s, transform 0.1s; display: flex; flex-direction: column; }
.cal-day:hover { border-color: var(--border2); background: var(--surface2); transform: translateY(-1px); }
.cal-day.empty { background: transparent; border-color: transparent; cursor: default; }
.cal-day.empty:hover { transform: none; }
.cal-day.today { border-color: var(--blue); }
.cal-day.today .day-num { color: var(--blue); }
.cal-day.selected { border-color: var(--gold); background: var(--surface2); }
.day-num { font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; font-weight: 600; color: var(--text2); }
.day-dot-row { display: flex; gap: 2px; flex-wrap: wrap; margin-top: 3px; }
.day-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.day-pct-badge { margin-top: auto; font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; font-weight: 600; padding: 2px 5px; border-radius: 4px; align-self: flex-start; }
.day-pct-badge.high  { background: #0f3020; color: var(--green); }
.day-pct-badge.mid   { background: var(--gold-dim); color: var(--gold); }
.day-pct-badge.low   { background: #2a1010; color: #f87171; }
.day-pct-badge.zero  { background: var(--surface3); color: var(--text3); }
 
.twoweek-header { margin-bottom: 20px; }
.twoweek-title { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 0.06em; }
.twoweek-sub { font-size: 0.82rem; color: var(--text3); font-family: 'JetBrains Mono', monospace; margin-top: 4px; }
.twoweek-list { display: flex; flex-direction: column; gap: 16px; }
.tw-day-block { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.tw-day-head { padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.tw-day-label { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 0.06em; }
.tw-day-label.today-label { color: var(--blue); }
.tw-day-pct { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--text3); }
.tw-day-tasks { padding: 10px 16px; display: flex; flex-direction: column; gap: 6px; }
.tw-empty { font-size: 0.8rem; color: var(--text3); font-style: italic; padding: 8px 0; }
.tw-task-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 7px; background: var(--surface2); border: 1px solid var(--border); transition: border-color 0.15s; }
.tw-task-item.done { opacity: 0.5; }
.tw-cat-badge { font-size: 0.62rem; font-weight: 600; letter-spacing: 0.06em; padding: 2px 6px; border-radius: 4px; flex-shrink: 0; text-transform: uppercase; }
.tw-task-text { flex: 1; font-size: 0.82rem; color: var(--text); }
.tw-task-text.done-text { text-decoration: line-through; color: var(--text3); }
.tw-recur-badge { font-size: 0.62rem; color: var(--text3); font-family: 'JetBrains Mono', monospace; flex-shrink: 0; }
 
.panel-overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.55); }
.panel-overlay.open { display: block; }
.side-panel { position: fixed; top: 0; right: -100%; bottom: 0; width: min(var(--panel-w), 100vw); z-index: 201; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; transition: right 0.3s cubic-bezier(.4,0,.2,1); overflow: hidden; }
.side-panel.open { right: 0; }
.panel-header { padding: 16px 18px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; flex-shrink: 0; }
.panel-date { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 0.06em; line-height: 1; }
.panel-day-name { font-size: 0.75rem; color: var(--text3); margin-top: 2px; font-family: 'JetBrains Mono', monospace; }
.panel-close { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); border-radius: 6px; width: 32px; height: 32px; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
.panel-close:hover { background: var(--surface3); color: var(--text); }
.panel-overall { padding: 12px 18px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.overall-label { font-size: 0.7rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
.overall-bar-wrap { background: var(--surface3); border-radius: 4px; height: 8px; overflow: hidden; }
.overall-bar { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--blue), var(--green)); transition: width 0.4s; }
.overall-pct { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: var(--text); margin-top: 5px; }
.panel-cats { flex: 1; overflow-y: auto; padding: 12px 18px 20px; display: flex; flex-direction: column; gap: 16px; }
.panel-cats::-webkit-scrollbar { width: 4px; }
.panel-cats::-webkit-scrollbar-track { background: transparent; }
.panel-cats::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
 
.cat-block {}
.cat-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.cat-title { display: flex; align-items: center; gap: 7px; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; }
.cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.cat-pct-pill { font-family: 'JetBrains Mono', monospace; font-size: 0.68rem; padding: 2px 7px; border-radius: 20px; }
.task-list { display: flex; flex-direction: column; gap: 6px; }
.task-item { display: flex; align-items: flex-start; gap: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; padding: 8px 10px; transition: border-color 0.15s; }
.task-item:hover { border-color: var(--border2); }
.task-cb { width: 17px; height: 17px; flex-shrink: 0; margin-top: 1px; border: 2px solid var(--border2); border-radius: 4px; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.task-cb svg { display: none; }
.task-cb.checked svg { display: block; }
.task-info { flex: 1; min-width: 0; }
.task-text { font-size: 0.82rem; color: var(--text); line-height: 1.3; word-break: break-word; }
.task-text.done-text { text-decoration: line-through; color: var(--text3); }
.task-recur-label { font-size: 0.65rem; color: var(--text3); font-family: 'JetBrains Mono', monospace; margin-top: 2px; }
.task-del { background: transparent; border: none; color: var(--text3); cursor: pointer; font-size: 1rem; padding: 2px 4px; border-radius: 4px; transition: color 0.15s, background 0.15s; flex-shrink: 0; }
.task-del:hover { color: #f87171; background: rgba(248,113,113,0.1); }
.add-task-area { margin-top: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px; }
.add-task-row { display: flex; gap: 6px; }
.add-task-input { flex: 1; background: var(--surface3); border: 1px solid var(--border2); border-radius: 6px; padding: 7px 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.82rem; outline: none; transition: border-color 0.15s; }
.add-task-input:focus { border-color: var(--text3); }
.add-task-input::placeholder { color: var(--text3); }
.add-task-btn { background: var(--surface3); border: 1px solid var(--border2); color: var(--text2); border-radius: 6px; padding: 7px 12px; cursor: pointer; font-size: 1rem; font-weight: 600; transition: all 0.15s; flex-shrink: 0; }
.add-task-btn:hover { background: var(--border2); color: var(--text); }
.recur-row { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px; }
.recur-btn { font-size: 0.68rem; font-family: 'JetBrains Mono', monospace; padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border2); background: transparent; color: var(--text3); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.recur-btn:hover { border-color: var(--text3); color: var(--text2); }
.recur-btn.selected { background: var(--blue-dim); border-color: var(--blue); color: var(--blue); }
.custom-days-row { display: none; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
.custom-days-row.visible { display: flex; }
.day-pick-btn { font-size: 0.65rem; font-family: 'JetBrains Mono', monospace; padding: 3px 7px; border-radius: 4px; border: 1px solid var(--border2); background: transparent; color: var(--text3); cursor: pointer; transition: all 0.15s; }
.day-pick-btn.on { background: var(--purple-dim); border-color: var(--purple); color: var(--purple); }
 
/* ============================================================
   FLAG FOCUS PANEL
   ============================================================ */
.flag-panel-overlay {
  display: none; position: fixed; inset: 0; z-index: 250;
  background: rgba(0,0,0,0.6);
  align-items: flex-start; justify-content: center;
  padding: 20px;
}
.flag-panel-overlay.open { display: flex; }
 
.flag-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: 3px solid var(--gold);
  border-radius: var(--radius);
  width: 100%; max-width: 440px;
  max-height: min(90vh, 600px);
  display: flex; flex-direction: column;
  overflow: hidden;
  margin-top: 60px;
  box-shadow: 0 24px 64px rgba(0,0,0,0.6), 0 0 0 1px rgba(245,158,11,0.08);
  animation: flag-panel-in 0.22s cubic-bezier(.4,0,.2,1);
}
@keyframes flag-panel-in {
  from { opacity: 0; transform: translateY(-12px) scale(0.97); }
  to   { opacity: 1; transform: none; }
}
 
.flag-panel-header {
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.flag-panel-title-group { display: flex; align-items: center; gap: 10px; }
.flag-panel-cat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.flag-panel-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.15rem; letter-spacing: 0.07em; line-height: 1;
}
.flag-panel-subtitle {
  font-size: 0.68rem; color: var(--text3);
  font-family: 'JetBrains Mono', monospace;
  margin-top: 3px;
}
.flag-panel-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem; font-weight: 600;
  padding: 3px 8px; border-radius: 20px;
  background: rgba(245,158,11,0.12);
  color: var(--gold);
  border: 1px solid rgba(245,158,11,0.25);
  flex-shrink: 0;
}
.flag-panel-close {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text2); border-radius: 6px;
  width: 28px; height: 28px; font-size: 1rem;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.15s; margin-left: 8px;
}
.flag-panel-close:hover { background: var(--surface3); color: var(--text); }
 
.flag-panel-body {
  flex: 1; overflow-y: auto; padding: 12px 16px 16px;
  display: flex; flex-direction: column; gap: 8px;
}
.flag-panel-body::-webkit-scrollbar { width: 4px; }
.flag-panel-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
 
.flag-task-item {
  display: flex; align-items: flex-start; gap: 10px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 12px;
  transition: border-color 0.15s, opacity 0.2s;
}
.flag-task-item:hover { border-color: var(--border2); }
.flag-task-item.done-fade { opacity: 0.45; }
 
.flag-task-cb {
  width: 18px; height: 18px; flex-shrink: 0; margin-top: 1px;
  border: 2px solid var(--border2); border-radius: 5px;
  background: transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.flag-task-cb svg { display: none; }
.flag-task-cb.checked svg { display: block; }
 
.flag-task-info { flex: 1; min-width: 0; }
.flag-task-text {
  font-size: 0.84rem; color: var(--text); line-height: 1.35;
  word-break: break-word;
}
.flag-task-text.struck { text-decoration: line-through; color: var(--text3); }
.flag-task-recur {
  font-size: 0.64rem; color: var(--text3);
  font-family: 'JetBrains Mono', monospace; margin-top: 3px;
}
 
.flag-task-del {
  background: transparent; border: none; color: var(--text3);
  cursor: pointer; font-size: 1rem; padding: 2px 4px;
  border-radius: 4px; flex-shrink: 0;
  transition: color 0.15s, background 0.15s;
}
.flag-task-del:hover { color: #f87171; background: rgba(248,113,113,0.1); }
 
.flag-panel-empty {
  text-align: center; color: var(--text3);
  font-size: 0.82rem; font-style: italic;
  padding: 24px 0; flex: 1; display: flex; align-items: center; justify-content: center;
}
 
.flag-panel-footer {
  padding: 10px 16px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.flag-panel-progress-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem; color: var(--text3);
}
.flag-panel-full-btn {
  font-size: 0.74rem; font-family: 'DM Sans', sans-serif; font-weight: 500;
  padding: 6px 12px; border-radius: 6px;
  background: var(--blue-dim); border: 1px solid var(--blue);
  color: var(--blue); cursor: pointer; transition: all 0.15s;
}
.flag-panel-full-btn:hover { background: var(--blue); color: #fff; }
 
/* ─────────────────────────────── */
 
.modal-overlay { display: none; position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.open { display: flex; }

<script>
/* ============================================================
   CONFIG
   ============================================================ */
const BASE_CATS = [
  { key: 'blue',   label: 'Personal Promises',  color: '#3b82f6' },
  { key: 'gold',   label: 'Promises to Others', color: '#f59e0b' },
  { key: 'slate',  label: 'Not Important',       color: '#64748b' },
  { key: 'green',  label: 'Health & Wellness',   color: '#22c55e' },
];
const ROLE_COLORS = ['#f97316','#06b6d4','#ec4899','#84cc16','#eab308','#14b8a6','#6366f1','#f43f5e','#8b5cf6','#10b981'];
const MAX_ROLES = 10;
const DEFAULT_ROLE_NAMES = ['Father','Leader','Son','Partner','Professional','Friend'];
const RECUR_OPTIONS = [
  { key: 'none', label: 'Once' }, { key: 'daily', label: 'Daily' },
  { key: 'weekly', label: 'Weekly' }, { key: 'biweekly', label: 'Biweekly' },
  { key: 'monthly', label: 'Monthly' }, { key: 'custom', label: 'Custom' },
];
const DOW_LABELS = ['Su','Mo','Tu','We','Th','Fr','Sa'];
const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
 
/* ============================================================
   STATE
   ============================================================ */
const today = new Date(); today.setHours(0,0,0,0);
let activeDateKey = null;
let addState = {};
 
// Flag panel state
let flagPanelCatKey = null;
let flagPanelCat    = null;
 
/* ============================================================
   DATE WINDOW
   ============================================================ */
function getDateWindow() {
  const s = ls_get('date_window');
  if (s && typeof s.year === 'number' && typeof s.month === 'number') return s;
  return { year: today.getFullYear(), month: today.getMonth() };
}
function saveDateWindow(year, month) { ls_set('date_window', { year, month }); }
function getWindowMonths() {
  const w = getDateWindow();
  return [0, 1, 2].map(delta => {
    const raw = w.month + delta;
    return { y: w.year + Math.floor(raw / 12), m: raw % 12 };
  });
}
 
/* ============================================================
   PANEL SORT
   ============================================================ */
function getPanelSort() { return ls_get('panel_sort') || 'default'; }
function savePanelSort(v) { ls_set('panel_sort', v); }
function setPanelSort(val) { savePanelSort(val); updateSortPills(val); renderPanel(); }
function updateSortPills(val) {
  ['tasks','alpha','default'].forEach(k => {
    const el = document.getElementById('sort-pill-' + k);
    if (el) el.classList.toggle('active', val === k);
  });
}
function getSortedCats(dayData) {
  const cats = getAllCats();
  const sort = getPanelSort();
  if (sort === 'alpha') return [...cats].sort((a,b) => a.label.localeCompare(b.label));
  if (sort === 'tasks') return [...cats].sort((a,b) => {
    const aHas = (dayData[a.key]||[]).length > 0 ? 0 : 1;
    const bHas = (dayData[b.key]||[]).length > 0 ? 0 : 1;
    return aHas - bHas;
  });
  return cats;
}
 
/* ============================================================
   STORAGE
   ============================================================ */
function ls_get(key) { return JSON.parse(localStorage.getItem('lt_' + key) || 'null'); }
function ls_set(key, val) { localStorage.setItem('lt_' + key, JSON.stringify(val)); }
 
function getSettings() {
  const s = ls_get('settings') || {};
  const deleted = s._deleted || [];
  BASE_CATS.forEach(c => { if (!deleted.includes(c.key) && !s[c.key]) s[c.key] = c.label; });
  return s;
}
function saveSettings(s) { ls_set('settings', s); }
function getRoles() {
  let r = ls_get('roles');
  if (!r) {
    r = DEFAULT_ROLE_NAMES.map((name,i) => ({ id:'role_'+i, name, color: ROLE_COLORS[i%ROLE_COLORS.length] }));
    ls_set('roles', r);
  }
  return r;
}
function saveRoles(r) { ls_set('roles', r); }
function getCustomCats() { return ls_get('custom_cats') || []; }
function saveCustomCats(c) { ls_set('custom_cats', c); }
 
function getDefaultDay() {
  const deleted = (ls_get('settings')||{})._deleted || [];
  const d = {};
  BASE_CATS.filter(c => !deleted.includes(c.key)).forEach(c => { d[c.key] = []; });
  getCustomCats().forEach(c => { d[c.id] = []; });
  return d;
}
function getDay(key) {
  const d = ls_get('day_' + key) || getDefaultDay();
  const deleted = (ls_get('settings')||{})._deleted || [];
  BASE_CATS.filter(c => !deleted.includes(c.key)).forEach(c => { if (!d[c.key]) d[c.key] = []; });
  getCustomCats().forEach(c => { if (!d[c.id]) d[c.id] = []; });
  getRoles().forEach(r => { if (!d[r.id]) d[r.id] = []; });
  return d;
}
function setDay(key, val) { ls_set('day_' + key, val); }
function getRecurring() { return ls_get('recur') || []; }
function saveRecurring(r) { ls_set('recur', r); }
 
/* ============================================================
   DATE UTILITIES
   ============================================================ */
function dateKey(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}
function parseKey(key) {
  const [y,m,d] = key.split('-').map(Number);
  const dt = new Date(y, m-1, d); dt.setHours(0,0,0,0); return dt;
}
function recurFires(template, dt) {
  const start = parseKey(template.startKey);
  if (dt < start) return false;
  const diffDays = Math.round((dt - start) / 86400000);
  switch (template.recur) {
    case 'daily':    return true;
    case 'weekly':   return diffDays % 7 === 0;
    case 'biweekly': return diffDays % 14 === 0;
    case 'monthly':  return dt.getDate() === start.getDate();
    case 'custom':   return (template.customDays||[]).includes(dt.getDay());
    default: return false;
  }
}
function recurLabel(r, customDays) {
  if (r === 'none' || !r) return '';
  if (r === 'custom' && customDays && customDays.length) return '↻ ' + customDays.map(d => DOW_LABELS[d]).join(',');
  return '↻ ' + r.charAt(0).toUpperCase() + r.slice(1);
}
 
/* ============================================================
   RECURRING PROPAGATION
   ============================================================ */
function propagateRecurring(key) {
  const dt = parseKey(key);
  const templates = getRecurring();
  const data = getDay(key);
  let changed = false;
  templates.forEach(t => {
    if (!recurFires(t, dt)) return;
    const arr = data[t.catKey] || [];
    if (!arr.some(task => task.recurId === t.id)) {
      if (!data[t.catKey]) data[t.catKey] = [];
      data[t.catKey].push({ text: t.text, done: false, recurId: t.id, recur: t.recur, customDays: t.customDays||[] });
      changed = true;
    }
  });
  if (changed) setDay(key, data);
}
 
/* ============================================================
   DAY TOTALS
   ============================================================ */
function dayTotals(key) {
  propagateRecurring(key);
  const d = getDay(key);
  let done = 0, total = 0;
  getAllCats().forEach(c => {
    total += (d[c.key]||[]).length;
    done  += (d[c.key]||[]).filter(t => t.done).length;
  });
  return { done, total };
}
 
/* ============================================================
   DEFICIT MECHANIC
   ============================================================ */
function calcDeficitPct(catKey, windowDays) {
  let totalTasks = 0, doneTasks = 0, hasPastData = false;
  // Today's completed tasks: each done = +1, each incomplete = 0 (no penalty while live)
  // We model this by only counting done tasks from today toward the score,
  // treating each as if it were a "task with no missed counterpart".
  // Mechanically: score += doneTodayCount (not subject to the missed penalty).
  let todayDoneBonus = 0;
  windowDays.forEach(key => {
    const dt = parseKey(key);
    const isToday = dt.getTime() === today.getTime();
    if (dt > today) return;  // future → skip
    propagateRecurring(key);
    const raw = ls_get('day_' + key);
    if (!raw) return;
    const arr = raw[catKey] || [];
    if (arr.length === 0) return;
    if (isToday) {
      // Only completed tasks from today contribute; incomplete are neutral
      const doneToday = arr.filter(t => t.done).length;
      if (doneToday > 0) {
        todayDoneBonus += doneToday;
        hasPastData = true;
      }
      return;
    }
    // Past days: full deficit logic
    hasPastData = true;
    totalTasks += arr.length;
    doneTasks  += arr.filter(t => t.done).length;
  });
  // Build score: past deficit + today bonus
  // Past score = doneTasks - missed = 2*doneTasks - totalTasks
  // Today bonus = +1 per completed task (no corresponding miss)
  // Denominator = totalTasks (past) + todayDoneBonus (today's contributing tasks)
  const combinedTotal = totalTasks + todayDoneBonus;
  if (!hasPastData || combinedTotal === 0) return { pct: 0, done: doneTasks + todayDoneBonus, total: totalTasks, hasPastData: false };
  const missed = totalTasks - doneTasks;
  const score  = (doneTasks - missed) + todayDoneBonus;
  const pct    = Math.round((score / combinedTotal) * 100);
  return { pct, done: doneTasks + todayDoneBonus, total: totalTasks, hasPastData: true };
}
 
/* ============================================================
   NAVIGATION
   ============================================================ */
function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  if (btn) btn.classList.add('active');
  if (id === 'calendar')  buildCalendar();
  if (id === 'dashboard') renderDashboard();
  if (id === 'twoweek')   renderTwoWeek();
}
 
/* ============================================================
   DASHBOARD
   ============================================================ */
function renderDashboard() {
  const settings = getSettings();
  const roles = getRoles();
  const winMonths = getWindowMonths();
 
  const sm = winMonths[0], em = winMonths[2];
  document.getElementById('dash-range').textContent =
    `${MONTH_NAMES[sm.m].slice(0,3)} ${sm.y} → ${MONTH_NAMES[em.m].slice(0,3)} ${em.y}`;
 
  const windowDays = [];
  winMonths.forEach(({ y, m }) => {
    const dim = new Date(y, m+1, 0).getDate();
    for (let day = 1; day <= dim; day++) windowDays.push(dateKey(y, m, day));
  });
 
  windowDays.forEach(key => propagateRecurring(key));
 
  const deletedCats = (getSettings()._deleted || []);
  const activeBases = BASE_CATS.filter(c => !deletedCats.includes(c.key));
  const customCats  = getCustomCats();
  let grandDonePast = 0, grandTotalPast = 0;
  let grandTodayDoneBonus = 0;
  let grandDoneAll = 0, grandTotalAll = 0, daysLogged = 0;
 
  windowDays.forEach(key => {
    const raw = ls_get('day_' + key);
    if (!raw) return;
    const dt = parseKey(key);
    const isPast  = dt < today;
    const isToday = dt.getTime() === today.getTime();
    let dayHas = false;
    const allKeys = [...BASE_CATS.map(c=>c.key), ...customCats.map(c=>c.id), ...roles.map(r=>r.id)];
    allKeys.forEach(k => {
      const arr = raw[k] || [];
      if (arr.length > 0) {
        dayHas = true;
        grandTotalAll += arr.length;
        grandDoneAll  += arr.filter(x => x.done).length;
        if (isPast) {
          grandTotalPast += arr.length;
          grandDonePast  += arr.filter(x => x.done).length;
        } else if (isToday) {
          grandTodayDoneBonus += arr.filter(x => x.done).length;
        }
      }
    });
    if (dayHas) daysLogged++;
  });
 
  let overallPct = 0;
  const grandCombinedTotal = grandTotalPast + grandTodayDoneBonus;
  if (grandCombinedTotal > 0) {
    const missed = grandTotalPast - grandDonePast;
    const score  = (grandDonePast - missed) + grandTodayDoneBonus;
    overallPct = Math.round((score / grandCombinedTotal) * 100);
  }
 
  const baseGrid = document.getElementById('dash-base-grid');
  baseGrid.innerHTML = '';
  activeBases.forEach(c => {
    const r = calcDeficitPct(c.key, windowDays);
    baseGrid.appendChild(makeStatCard(c.key, settings[c.key]||c.label, c.color, r.pct, r.done, r.total, r.hasPastData));
  });
  customCats.forEach(c => {
    const r = calcDeficitPct(c.id, windowDays);
    baseGrid.appendChild(makeStatCard(c.id, c.name, c.color, r.pct, r.done, r.total, r.hasPastData));
  });
 
  const rolesGrid = document.getElementById('dash-roles-grid');
  const rolesLabel = document.getElementById('roles-section-label');
  rolesGrid.innerHTML = '';
  if (roles.length > 0) {
    rolesLabel.style.display = 'block';
    roles.forEach(ro => {
      const r = calcDeficitPct(ro.id, windowDays);
      rolesGrid.appendChild(makeStatCard(ro.id, ro.name, ro.color, r.pct, r.done, r.total, r.hasPastData));
    });
  } else {
    rolesLabel.style.display = 'none';
  }
 
  const overallEl = document.getElementById('sum-overall');
  overallEl.textContent = grandCombinedTotal > 0 ? overallPct + '%' : '0%';
  overallEl.className = 'sum-val' + (overallPct < 0 ? ' negative' : '');
  document.getElementById('sum-days-logged').textContent = daysLogged;
  document.getElementById('sum-total-tasks').textContent = grandTotalAll;
  document.getElementById('sum-completed').textContent   = grandDoneAll;
}
 
/* ============================================================
   makeStatCard  — flag is now a clickable button
   ============================================================ */
function makeStatCard(catKey, label, color, pct, done, total, hasPastData) {
  const circ   = 138.23;
  const fillPct = Math.max(0, Math.min(100, pct));
  const offset  = circ - (circ * fillPct / 100);
  const isNeg   = pct < 0;
 
  let ringState, ringColor;
  if (!hasPastData || total === 0) {
    ringState = 'neutral'; ringColor = '#5a5a70';
  } else if (pct <= 0) {
    ringState = 'red';    ringColor = '#f87171';
  } else if (pct < 100) {
    ringState = 'amber';  ringColor = '#f59e0b';
  } else {
    ringState = 'green';  ringColor = '#22c55e';
  }
 
  const todayKey  = dateKey(today.getFullYear(), today.getMonth(), today.getDate());
  propagateRecurring(todayKey);
  const todayData = ls_get('day_' + todayKey);
  const todayArr  = todayData ? (todayData[catKey]||[]) : [];
  const incompleteTodayCount = todayArr.filter(t => !t.done).length;
  const hasFlag   = incompleteTodayCount > 0;
  const allDoneToday = todayArr.length > 0 && incompleteTodayCount === 0;
 
  const missedCount = total > 0 ? (total - done) : 0;
  const deficitNote = (isNeg || missedCount > 0 || done >= missedCount) ? `<div class="stat-deficit-note">↓ ${done} missed</div>` : '';
 
  const card = document.createElement('div');
  card.className = 'stat-card';
  card.style.borderTopColor = color;
  card.innerHTML = `
    <div class="stat-card-top">
      <div class="stat-label" title="${label}">${label}</div>
      ${hasFlag
        ? `<button class="stat-flag" title="${incompleteTodayCount} incomplete task${incompleteTodayCount !== 1 ? 's' : ''} today — click to view" data-catkey="${catKey}" data-label="${label}" data-color="${color}">🚩</button>`
        : allDoneToday
        ? `<button class="stat-flag stat-flag-done" title="All tasks complete today — click to view" data-catkey="${catKey}" data-label="${label}" data-color="${color}">✅</button>`
        : ''}
    </div>
    <div class="stat-ring-row">
      <div class="ring-wrap">
        <svg class="ring" width="54" height="54" viewBox="0 0 54 54">
          <circle class="ring-bg" cx="27" cy="27" r="22"/>
          <circle class="ring-fill" cx="27" cy="27" r="22"
            stroke="${ringColor}"
            stroke-dasharray="${circ}"
            stroke-dashoffset="${offset}"
            style="fill:none;stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset 0.7s cubic-bezier(.4,0,.2,1)"/>
        </svg>
      </div>
      <div>
        <div class="stat-pct state-${ringState}${isNeg?' negative':''}">${pct}%</div>
        <div class="stat-detail">${done} / ${total} past</div>
        ${deficitNote}
      </div>
    </div>`;
 
  // Attach flag click handler
  const flagBtn = card.querySelector('.stat-flag');
  if (flagBtn) {
    flagBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      openFlagPanel(catKey, label, color);
    });
  }
 
  return card;
}
 
/* ============================================================
   FLAG FOCUS PANEL
   ============================================================ */
function openFlagPanel(catKey, catLabel, catColor) {
  flagPanelCatKey = catKey;
  flagPanelCat    = { key: catKey, label: catLabel, color: catColor };
 
  document.getElementById('fp-cat-dot').style.background = catColor;
  document.getElementById('fp-title').textContent = catLabel.toUpperCase();
  document.getElementById('fp-cat-dot').style.background = catColor;
 
  renderFlagPanel();
  document.getElementById('flag-panel-overlay').classList.add('open');
}
 
function renderFlagPanel() {
  if (!flagPanelCatKey) return;
  const todayKey = dateKey(today.getFullYear(), today.getMonth(), today.getDate());
  propagateRecurring(todayKey);
  const data = getDay(todayKey);
  const tasks = data[flagPanelCatKey] || [];
 
  const incomplete = tasks.filter(t => !t.done).length;
  const total      = tasks.length;
  const done       = total - incomplete;
 
  document.getElementById('fp-badge').textContent = `${incomplete} pending`;
  document.getElementById('fp-progress').textContent = `${done} of ${total} complete`;
 
  const body = document.getElementById('fp-body');
  body.innerHTML = '';
 
  if (tasks.length === 0) {
    body.innerHTML = '<div class="flag-panel-empty">No tasks for today in this category.</div>';
    return;
  }
 
  // Show all tasks (so you can see done ones too), incomplete first
  const sorted = [...tasks.map((t,i) => ({...t, _idx: i}))].sort((a,b) => {
    if (a.done === b.done) return 0;
    return a.done ? 1 : -1;
  });
 
  sorted.forEach(task => {
    const idx = task._idx;
    const item = document.createElement('div');
    item.className = 'flag-task-item' + (task.done ? ' done-fade' : '');
    item.dataset.idx = idx;
 
    const cb = document.createElement('div');
    cb.className = 'flag-task-cb' + (task.done ? ' checked' : '');
    if (task.done) { cb.style.background = flagPanelCat.color; cb.style.borderColor = flagPanelCat.color; }
    cb.innerHTML = checkSVG();
    cb.onclick = () => {
      const d = getDay(todayKey);
      d[flagPanelCatKey][idx].done = !d[flagPanelCatKey][idx].done;
      setDay(todayKey, d);
      renderFlagPanel();
      renderDashboard();
    };
 
    const info = document.createElement('div');
    info.className = 'flag-task-info';
    const txt = document.createElement('div');
    txt.className = 'flag-task-text' + (task.done ? ' struck' : '');
    txt.textContent = task.text;
    info.appendChild(txt);
    if (task.recur && task.recur !== 'none') {
      const rl = document.createElement('div'); rl.className = 'flag-task-recur';
      rl.textContent = recurLabel(task.recur, task.customDays); info.appendChild(rl);
    }
 
    const del = document.createElement('button');
    del.className = 'flag-task-del'; del.textContent = '×';
    del.onclick = () => requestFlagDeleteTask(idx, task);
 
    item.appendChild(cb); item.appendChild(info); item.appendChild(del);
    body.appendChild(item);
  });
}
 
function requestFlagDeleteTask(idx, task) {
  const todayKey = dateKey(today.getFullYear(), today.getMonth(), today.getDate());
  if (task.recurId) {
    document.getElementById('confirm-title').textContent = 'Delete Recurring Task';
    document.getElementById('confirm-msg').textContent = `"${task.text}" repeats ${task.recur}. What would you like to delete?`;
    const btns = document.getElementById('confirm-btns'); btns.innerHTML = '';
    const b1 = document.createElement('button'); b1.className = 'confirm-btn secondary'; b1.textContent = 'This day only';
    b1.onclick = () => { deleteFlagTask(todayKey, flagPanelCatKey, idx, false, task.recurId); closeConfirm(); };
    const b2 = document.createElement('button'); b2.className = 'confirm-btn primary'; b2.textContent = 'This & all future';
    b2.onclick = () => { deleteFlagTask(todayKey, flagPanelCatKey, idx, true, task.recurId); closeConfirm(); };
    const b3 = document.createElement('button'); b3.className = 'confirm-btn cancel'; b3.textContent = 'Cancel'; b3.onclick = closeConfirm;
    btns.appendChild(b1); btns.appendChild(b2); btns.appendChild(b3);
    document.getElementById('confirm-modal').classList.add('open');
  } else {
    deleteFlagTask(todayKey, flagPanelCatKey, idx, false, null);
  }
}
 
function deleteFlagTask(key, catKey, idx, deleteFuture, recurId) {
  const data = getDay(key);
  data[catKey].splice(idx, 1);
  setDay(key, data);
  if (deleteFuture && recurId) {
    let templates = getRecurring();
    templates = templates.filter(t => t.id !== recurId); saveRecurring(templates);
    for (let i = 1; i <= 90; i++) {
      const dt = new Date(today); dt.setDate(today.getDate() + i);
      const fkey = dateKey(dt.getFullYear(), dt.getMonth(), dt.getDate());
      const fdata = ls_get('day_' + fkey); if (!fdata) continue;
      let changed = false;
      Object.keys(fdata).forEach(k => {
        const before = fdata[k].length;
        fdata[k] = fdata[k].filter(t => t.recurId !== recurId);
        if (fdata[k].length !== before) changed = true;
      });
      if (changed) ls_set('day_' + fkey, fdata);
    }
  }
  renderFlagPanel();
  renderDashboard();
  // If full-day panel is open for today, re-render it too
  if (activeDateKey === key) renderPanel();
}
 
function closeFlagPanel(e) {
  if (e && e.target !== document.getElementById('flag-panel-overlay')) return;
  closeFlagPanelDirect();
}
function closeFlagPanelDirect() {
  document.getElementById('flag-panel-overlay').classList.remove('open');
  flagPanelCatKey = null;
  flagPanelCat    = null;
}
 
function openFullDayFromFlag() {
  closeFlagPanelDirect();
  const y = today.getFullYear(), m = today.getMonth(), d = today.getDate();
  openPanel(dateKey(y, m, d), y, m, d);
}
 
/* ============================================================
   CALENDAR
   ============================================================ */
function buildCalendar() {
  const container = document.getElementById('cal-months');
  container.innerHTML = '';
  getWindowMonths().forEach(({ y, m }) => container.appendChild(buildMonth(y, m)));
}
 
function buildMonth(y, m) {
  const wrap = document.createElement('div');
  wrap.className = 'month-block';
  const head = document.createElement('div');
  head.className = 'month-heading';
  head.innerHTML = `${MONTH_NAMES[m]} <span>${y}</span>`;
  wrap.appendChild(head);
  const grid = document.createElement('div');
  grid.className = 'cal-grid';
  DOW_LABELS.forEach(dl => {
    const el = document.createElement('div'); el.className = 'cal-dow'; el.textContent = dl; grid.appendChild(el);
  });
  const firstDow = new Date(y, m, 1).getDay();
  for (let i = 0; i < firstDow; i++) {
    const el = document.createElement('div'); el.className = 'cal-day empty'; grid.appendChild(el);
  }
  const daysInMonth = new Date(y, m+1, 0).getDate();
  for (let day = 1; day <= daysInMonth; day++) {
    const key = dateKey(y, m, day);
    const cellDate = new Date(y, m, day); cellDate.setHours(0,0,0,0);
    propagateRecurring(key);
    const cell = document.createElement('div');
    cell.className = 'cal-day';
    if (cellDate.getTime() === today.getTime()) cell.classList.add('today');
    if (cellDate < today) cell.classList.add('past');
    const numEl = document.createElement('div');
    numEl.className = 'day-num'; numEl.textContent = day; cell.appendChild(numEl);
    const dotRow = document.createElement('div'); dotRow.className = 'day-dot-row';
    const dayData = getDay(key);
    getAllCats().forEach(c => {
      if ((dayData[c.key]||[]).length > 0) {
        const dot = document.createElement('div'); dot.className = 'day-dot'; dot.style.background = c.color; dotRow.appendChild(dot);
      }
    });
    cell.appendChild(dotRow);
    if (cellDate <= today) {
      const { done, total } = dayTotals(key);
      if (total > 0) {
        const pct = Math.round(done/total*100);
        const badge = document.createElement('div');
        badge.className = 'day-pct-badge ' + (pct >= 80 ? 'high' : pct >= 40 ? 'mid' : 'low');
        badge.textContent = pct + '%'; cell.appendChild(badge);
      }
    }
    cell.dataset.key = key;
    cell.addEventListener('click', () => openPanel(key, y, m, day));
    grid.appendChild(cell);
  }
  wrap.appendChild(grid);
  return wrap;
}
 
/* ============================================================
   TWO-WEEK VIEW
   ============================================================ */
function renderTwoWeek() {
  const list = document.getElementById('twoweek-list');
  list.innerHTML = '';
  const end = new Date(today); end.setDate(end.getDate() + 13);
  const fmt = dt => `${MONTH_NAMES[dt.getMonth()].slice(0,3)} ${dt.getDate()}`;
  document.getElementById('twoweek-range').textContent = `${fmt(today)} — ${fmt(end)}, ${end.getFullYear()}`;
  for (let i = 0; i < 14; i++) {
    const dt = new Date(today); dt.setDate(dt.getDate() + i);
    const y = dt.getFullYear(), m = dt.getMonth(), d = dt.getDate();
    const key = dateKey(y, m, d);
    propagateRecurring(key);
    const dayData = getDay(key);
    const allTasks = [];
    getAllCats().forEach(c => { (dayData[c.key]||[]).forEach((t, idx) => allTasks.push({ cat: c, task: t, idx })); });
    const block = document.createElement('div');
    block.className = 'tw-day-block';
    const isToday = dt.getTime() === today.getTime();
    const dow = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][dt.getDay()];
    const { done, total } = dayTotals(key);
    const pct = total > 0 ? Math.round(done/total*100) : 0;
    block.innerHTML = `<div class="tw-day-head"><div class="tw-day-label ${isToday?'today-label':''}">${isToday?'★ ':''}${dow.toUpperCase()}, ${MONTH_NAMES[m].slice(0,3).toUpperCase()} ${d}</div><div class="tw-day-pct">${total > 0 ? pct+'%' : '—'}</div></div>`;
    const taskDiv = document.createElement('div');
    taskDiv.className = 'tw-day-tasks';
    if (allTasks.length === 0) {
      taskDiv.innerHTML = '<div class="tw-empty">No tasks scheduled</div>';
    } else {
      allTasks.forEach(({ cat, task, idx }) => {
        const row = document.createElement('div');
        row.className = 'tw-task-item' + (task.done ? ' done' : '');
        const badge = document.createElement('div');
        badge.className = 'tw-cat-badge';
        badge.style.background = hexAlpha(cat.color, 0.15); badge.style.color = cat.color;
        badge.textContent = cat.label.split(' ')[0];
        const txt = document.createElement('div');
        txt.className = 'tw-task-text' + (task.done ? ' done-text' : '');
        txt.textContent = task.text;
        const recLbl = task.recur && task.recur !== 'none' ? document.createElement('div') : null;
        if (recLbl) { recLbl.className = 'tw-recur-badge'; recLbl.textContent = recurLabel(task.recur, task.customDays); }
        const cb = document.createElement('div');
        cb.className = 'task-cb' + (task.done ? ' checked' : '');
        cb.innerHTML = checkSVG();
        if (task.done) { cb.style.background = cat.color; cb.style.borderColor = cat.color; }
        cb.onclick = () => {
          const data = getDay(key);
          data[cat.key][idx].done = !data[cat.key][idx].done;
          setDay(key, data); renderTwoWeek(); renderDashboard();
        };
        row.appendChild(cb); row.appendChild(badge); row.appendChild(txt);
        if (recLbl) row.appendChild(recLbl);
        taskDiv.appendChild(row);
      });
    }
    block.appendChild(taskDiv);
    list.appendChild(block);
  }
}
 
/* ============================================================
   SIDE PANEL
   ============================================================ */
function openPanel(key, y, m, day) {
  activeDateKey = key;
  propagateRecurring(key);
  addState = {};
  getAllCats().forEach(c => { addState[c.key] = { recur: 'none', customDays: [] }; });
  const dt = new Date(y, m, day);
  const dow = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][dt.getDay()];
  document.getElementById('panel-date-text').textContent = `${MONTH_NAMES[m].slice(0,3).toUpperCase()} ${day}, ${y}`;
  document.getElementById('panel-day-name').textContent = dow.toUpperCase();
  updateSortPills(getPanelSort());
  renderPanel();
  document.getElementById('overlay').classList.add('open');
  document.getElementById('side-panel').classList.add('open');
  document.querySelectorAll('.cal-day').forEach(el => el.classList.remove('selected'));
  const sel = document.querySelector(`[data-key="${key}"]`);
  if (sel) sel.classList.add('selected');
}
 
function closePanel() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('side-panel').classList.remove('open');
  document.querySelectorAll('.cal-day').forEach(el => el.classList.remove('selected'));
  activeDateKey = null;
}
 
function renderPanel() {
  if (!activeDateKey) return;
  const data = getDay(activeDateKey);
  const { done, total } = dayTotals(activeDateKey);
  const pct = total > 0 ? Math.round(done/total*100) : 0;
  document.getElementById('overall-bar').style.width = Math.max(0, pct) + '%';
  document.getElementById('overall-pct-text').textContent = `${done} of ${total} tasks complete — ${pct}%`;
  const container = document.getElementById('panel-cats');
  container.innerHTML = '';
  getSortedCats(data).forEach(cat => {
    const tasks = data[cat.key] || [];
    const catDone = tasks.filter(t => t.done).length;
    const catPct  = tasks.length > 0 ? Math.round(catDone/tasks.length*100) : 0;
    const block = document.createElement('div');
    block.className = 'cat-block';
    const header = document.createElement('div');
    header.className = 'cat-header';
    header.innerHTML = `<div class="cat-title"><div class="cat-dot" style="background:${cat.color}"></div>${cat.label}</div><div class="cat-pct-pill" style="background:${hexAlpha(cat.color,0.15)};color:${cat.color}">${catPct}%</div>`;
    block.appendChild(header);
    const taskList = document.createElement('div');
    taskList.className = 'task-list';
    tasks.forEach((t, i) => taskList.appendChild(makeTaskEl(cat, t, i)));
    block.appendChild(taskList);
    const addArea = document.createElement('div');
    addArea.className = 'add-task-area';
    const addRow = document.createElement('div');
    addRow.className = 'add-task-row';
    const inp = document.createElement('input');
    inp.className = 'add-task-input'; inp.placeholder = 'Add task…'; inp.id = 'inp-' + cat.key;
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(cat.key); });
    const addBtn = document.createElement('button');
    addBtn.className = 'add-task-btn'; addBtn.textContent = '+'; addBtn.onclick = () => addTask(cat.key);
    addRow.appendChild(inp); addRow.appendChild(addBtn);
    addArea.appendChild(addRow);
    const recurRow = document.createElement('div');
    recurRow.className = 'recur-row';
    const customRow = document.createElement('div');
    customRow.className = 'custom-days-row';
    RECUR_OPTIONS.forEach(ro => {
      const btn = document.createElement('button');
      btn.className = 'recur-btn' + (addState[cat.key].recur === ro.key ? ' selected' : '');
      btn.textContent = ro.label; btn.dataset.val = ro.key;
      btn.onclick = () => {
        addState[cat.key].recur = ro.key;
        recurRow.querySelectorAll('.recur-btn').forEach(b => b.classList.toggle('selected', b.dataset.val === ro.key));
        customRow.classList.toggle('visible', ro.key === 'custom');
      };
      recurRow.appendChild(btn);
    });
    addArea.appendChild(recurRow);
    DOW_LABELS.forEach((dl, di) => {
      const btn = document.createElement('button');
      btn.className = 'day-pick-btn'; btn.textContent = dl;
      btn.onclick = () => {
        const st = addState[cat.key];
        if (st.customDays.includes(di)) st.customDays = st.customDays.filter(x => x !== di);
        else st.customDays.push(di);
        btn.classList.toggle('on', st.customDays.includes(di));
      };
      customRow.appendChild(btn);
    });
    addArea.appendChild(customRow);
    block.appendChild(addArea);
    container.appendChild(block);
  });
  refreshCalCell(activeDateKey);
  renderDashboard();
}
 
function makeTaskEl(cat, task, idx) {
  const item = document.createElement('div');
  item.className = 'task-item' + (task.done ? ' done' : '');
  const cb = document.createElement('div');
  cb.className = 'task-cb' + (task.done ? ' checked' : '');
  if (task.done) { cb.style.background = cat.color; cb.style.borderColor = cat.color; }
  cb.innerHTML = checkSVG(); cb.onclick = () => toggleTask(cat.key, idx);
  const info = document.createElement('div'); info.className = 'task-info';
  const txt = document.createElement('div');
  txt.className = 'task-text' + (task.done ? ' done-text' : ''); txt.textContent = task.text;
  info.appendChild(txt);
  if (task.recur && task.recur !== 'none') {
    const rl = document.createElement('div'); rl.className = 'task-recur-label';
    rl.textContent = recurLabel(task.recur, task.customDays); info.appendChild(rl);
  }
  const del = document.createElement('button');
  del.className = 'task-del'; del.textContent = '×'; del.onclick = () => requestDeleteTask(cat.key, idx, task);
  item.appendChild(cb); item.appendChild(info); item.appendChild(del);
  return item;
}
 
function addTask(catKey) {
  const inp = document.getElementById('inp-' + catKey);
  const text = inp.value.trim(); if (!text) return;
  const st = addState[catKey];
  const recur = st.recur, customDays = [...st.customDays];
  const data = getDay(activeDateKey);
  if (!data[catKey]) data[catKey] = [];
  if (recur !== 'none') {
    const templateId = 'rt_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
    const templates = getRecurring();
    templates.push({ id: templateId, catKey, text, recur, customDays, startKey: activeDateKey });
    saveRecurring(templates);
    data[catKey].push({ text, done: false, recurId: templateId, recur, customDays });
  } else {
    data[catKey].push({ text, done: false, recur: 'none', customDays: [] });
  }
  setDay(activeDateKey, data); inp.value = '';
  addState[catKey] = { recur: 'none', customDays: [] };
  renderPanel();
}
 
function toggleTask(catKey, idx) {
  const data = getDay(activeDateKey);
  data[catKey][idx].done = !data[catKey][idx].done;
  setDay(activeDateKey, data); renderPanel();
}
 
function requestDeleteTask(catKey, idx, task) {
  if (task.recurId) {
    document.getElementById('confirm-title').textContent = 'Delete Recurring Task';
    document.getElementById('confirm-msg').textContent = `"${task.text}" repeats ${task.recur}. What would you like to delete?`;
    const btns = document.getElementById('confirm-btns'); btns.innerHTML = '';
    const b1 = document.createElement('button'); b1.className = 'confirm-btn secondary'; b1.textContent = 'This day only';
    b1.onclick = () => { deleteTask(catKey, idx, false, task.recurId); closeConfirm(); };
    const b2 = document.createElement('button'); b2.className = 'confirm-btn primary'; b2.textContent = 'This & all future';
    b2.onclick = () => { deleteTask(catKey, idx, true, task.recurId); closeConfirm(); };
    const b3 = document.createElement('button'); b3.className = 'confirm-btn cancel'; b3.textContent = 'Cancel'; b3.onclick = closeConfirm;
    btns.appendChild(b1); btns.appendChild(b2); btns.appendChild(b3);
    document.getElementById('confirm-modal').classList.add('open');
  } else {
    deleteTask(catKey, idx, false, null);
  }
}
 
function deleteTask(catKey, idx, deleteFuture, recurId) {
  const data = getDay(activeDateKey);
  data[catKey].splice(idx, 1); setDay(activeDateKey, data);
  if (deleteFuture && recurId) {
    let templates = getRecurring();
    templates = templates.filter(t => t.id !== recurId); saveRecurring(templates);
    for (let i = 1; i <= 90; i++) {
      const dt = new Date(today); dt.setDate(today.getDate() + i);
      const fkey = dateKey(dt.getFullYear(), dt.getMonth(), dt.getDate());
      const fdata = ls_get('day_' + fkey); if (!fdata) continue;
      let changed = false;
      Object.keys(fdata).forEach(k => {
        const before = fdata[k].length;
        fdata[k] = fdata[k].filter(t => t.recurId !== recurId);
        if (fdata[k].length !== before) changed = true;
      });
      if (changed) ls_set('day_' + fkey, fdata);
    }
  }
  renderPanel();
}
 
function closeConfirm() { document.getElementById('confirm-modal').classList.remove('open'); }
 
function refreshCalCell(key) {
  const cell = document.querySelector(`[data-key="${key}"]`);
  if (!cell) return;
  cell.querySelectorAll('.day-pct-badge, .day-dot-row').forEach(el => el.remove());
  const dayData = getDay(key);
  const dotRow = document.createElement('div'); dotRow.className = 'day-dot-row';
  getAllCats().forEach(c => {
    if ((dayData[c.key]||[]).length > 0) {
      const dot = document.createElement('div'); dot.className = 'day-dot'; dot.style.background = c.color; dotRow.appendChild(dot);
    }
  });
  cell.appendChild(dotRow);
  const cellDate = parseKey(key);
  if (cellDate <= today) {
    const { done, total } = dayTotals(key);
    if (total > 0) {
      const pct = Math.round(done/total*100);
      const badge = document.createElement('div');
      badge.className = 'day-pct-badge ' + (pct >= 80 ? 'high' : pct >= 40 ? 'mid' : 'low');
      badge.textContent = pct + '%'; cell.appendChild(badge);
    }
  }
}
 
/* ============================================================
   SETTINGS MODAL
   ============================================================ */
function openSettings() { renderSettings(); document.getElementById('settings-overlay').classList.add('open'); }
function closeSettings() {
  document.getElementById('settings-overlay').classList.remove('open');
  renderDashboard(); buildCalendar();
}
function maybeCloseSettings(e) { if (e.target === document.getElementById('settings-overlay')) closeSettings(); }
 
function showInlineConfirm(parentRow, message, onConfirm) {
  document.querySelectorAll('.inline-confirm').forEach(el => el.remove());
  const bar = document.createElement('div');
  bar.className = 'inline-confirm';
  bar.innerHTML = `<span class="inline-confirm-msg">${message}</span><button class="inline-confirm-yes">Delete</button><button class="inline-confirm-cancel">Cancel</button>`;
  bar.querySelector('.inline-confirm-yes').onclick = () => { bar.remove(); onConfirm(); };
  bar.querySelector('.inline-confirm-cancel').onclick = () => bar.remove();
  parentRow.insertAdjacentElement('afterend', bar);
}
 
function renderSettings() {
  const body = document.getElementById('settings-body');
  body.innerHTML = '';
  const settings = getSettings();
  const roles = getRoles();
 
  const windowSection = document.createElement('div');
  windowSection.innerHTML = '<div class="settings-section-label">Dashboard Date Window</div>';
  const windowBox = document.createElement('div');
  windowBox.className = 'date-window-box';
 
  const currentWindow = getDateWindow();
  const startSelect = document.createElement('select');
  startSelect.className = 'date-window-select';
  startSelect.title = 'Window start month';
 
  for (let delta = -12; delta <= 12; delta++) {
    const raw = today.getMonth() + delta;
    const y   = today.getFullYear() + Math.floor(raw / 12);
    const m   = ((raw % 12) + 12) % 12;
    const opt = document.createElement('option');
    opt.value = JSON.stringify({ year: y, month: m });
    opt.textContent = `${MONTH_NAMES[m].slice(0,3)} ${y}`;
    if (y === currentWindow.year && m === currentWindow.month) opt.selected = true;
    startSelect.appendChild(opt);
  }
 
  const endLabel = document.createElement('div');
  endLabel.className = 'date-window-end-label';
  function updateEndLabel() {
    const val = JSON.parse(startSelect.value);
    const endRaw = val.month + 2;
    const ey = val.year + Math.floor(endRaw / 12);
    const em = endRaw % 12;
    endLabel.textContent = `→ ${MONTH_NAMES[em].slice(0,3)} ${ey}`;
  }
  updateEndLabel();
  startSelect.addEventListener('change', updateEndLabel);
 
  const applyBtn = document.createElement('button');
  applyBtn.className = 'date-window-apply-btn';
  applyBtn.textContent = 'Apply';
  applyBtn.onclick = () => {
    const val = JSON.parse(startSelect.value);
    saveDateWindow(val.year, val.month);
    applyBtn.textContent = '✓ Saved';
    setTimeout(() => { applyBtn.textContent = 'Apply'; }, 1400);
    updateEndLabel();
    renderDashboard(); buildCalendar();
  };
 
  const dwRow = document.createElement('div');
  dwRow.className = 'date-window-row';
  dwRow.appendChild(startSelect); dwRow.appendChild(endLabel); dwRow.appendChild(applyBtn);
  windowBox.appendChild(dwRow);
 
  const dwNote = document.createElement('div');
  dwNote.className = 'date-window-note';
  dwNote.textContent = 'Sets the 3-month window shown on Dashboard and Calendar. Persisted across sessions.';
  windowBox.appendChild(dwNote);
  windowSection.appendChild(windowBox);
  body.appendChild(windowSection);
 
  const baseSection = document.createElement('div');
  baseSection.innerHTML = '<div class="settings-section-label">Base Categories</div>';
  BASE_CATS.forEach(c => {
    const row = document.createElement('div'); row.className = 'settings-row';
    const dot = document.createElement('div'); dot.className = 'settings-color-dot'; dot.style.background = c.color;
    const inp = document.createElement('input'); inp.className = 'settings-input'; inp.value = settings[c.key]||c.label; inp.placeholder = c.label;
    const saveBtn = document.createElement('button'); saveBtn.className = 'settings-save-btn'; saveBtn.textContent = 'Save';
    saveBtn.onclick = () => { const s = getSettings(); s[c.key] = inp.value.trim()||c.label; saveSettings(s); saveBtn.textContent = '✓'; setTimeout(() => { saveBtn.textContent = 'Save'; }, 1200); };
    const delBtn = document.createElement('button'); delBtn.className = 'settings-del-btn'; delBtn.textContent = '🗑';
    delBtn.onclick = () => showInlineConfirm(row, `Delete "${inp.value||c.label}"? Removes all its tasks.`, () => { deleteBaseCat(c.key); renderSettings(); });
    row.appendChild(dot); row.appendChild(inp); row.appendChild(saveBtn); row.appendChild(delBtn);
    baseSection.appendChild(row);
  });
  body.appendChild(baseSection);
 
  const customCatsNow = getCustomCats();
  const customSection = document.createElement('div');
  customSection.innerHTML = '<div class="settings-section-label">Custom Categories</div>';
  customCatsNow.forEach(c => {
    const row = document.createElement('div'); row.className = 'settings-row';
    const dot = document.createElement('div'); dot.className = 'settings-color-dot'; dot.style.background = c.color;
    const inp = document.createElement('input'); inp.className = 'settings-input'; inp.value = c.name; inp.placeholder = 'Category name';
    const saveBtn = document.createElement('button'); saveBtn.className = 'settings-save-btn'; saveBtn.textContent = 'Save';
    saveBtn.onclick = () => { const cs = getCustomCats(); const t = cs.find(x => x.id===c.id); if(t){t.name=inp.value.trim()||c.name; saveCustomCats(cs);} saveBtn.textContent='✓'; setTimeout(()=>{saveBtn.textContent='Save';},1200); };
    const delBtn = document.createElement('button'); delBtn.className = 'settings-del-btn'; delBtn.textContent = '🗑';
    delBtn.onclick = () => showInlineConfirm(row, `Delete "${inp.value||c.name}"? Removes all its tasks.`, () => { deleteCustomCat(c.id); renderSettings(); });
    row.appendChild(dot); row.appendChild(inp); row.appendChild(saveBtn); row.appendChild(delBtn);
    customSection.appendChild(row);
  });
  const addCatRow = document.createElement('div'); addCatRow.className = 'add-role-row';
  const addCatInp = document.createElement('input'); addCatInp.className = 'settings-input'; addCatInp.placeholder = 'New category name…';
  const addCatBtn = document.createElement('button'); addCatBtn.className = 'add-role-btn'; addCatBtn.textContent = '+ Add Category';
  addCatBtn.onclick = () => {
    const name = addCatInp.value.trim(); if (!name) return;
    const cs = getCustomCats(); cs.push({ id:'cat_'+Date.now(), name, color: ROLE_COLORS[(cs.length+getRoles().length)%ROLE_COLORS.length] });
    saveCustomCats(cs); addCatInp.value=''; renderSettings();
  };
  addCatInp.addEventListener('keydown', e => { if(e.key==='Enter') addCatBtn.click(); });
  addCatRow.appendChild(addCatInp); addCatRow.appendChild(addCatBtn);
  customSection.appendChild(addCatRow);
  body.appendChild(customSection);
 
  const rolesSection = document.createElement('div');
  rolesSection.innerHTML = `<div class="settings-section-label">My Roles (${roles.length}/${MAX_ROLES})</div>`;
  roles.forEach(r => {
    const row = document.createElement('div'); row.className = 'settings-row';
    const dot = document.createElement('div'); dot.className = 'settings-color-dot'; dot.style.background = r.color;
    const inp = document.createElement('input'); inp.className = 'settings-input'; inp.value = r.name; inp.placeholder = 'Role name';
    const saveBtn = document.createElement('button'); saveBtn.className = 'settings-save-btn'; saveBtn.textContent = 'Save';
    saveBtn.onclick = () => { const rs=getRoles(); const t=rs.find(x=>x.id===r.id); if(t){t.name=inp.value.trim()||r.name; saveRoles(rs);} saveBtn.textContent='✓'; setTimeout(()=>{saveBtn.textContent='Save';},1200); };
    const delBtn = document.createElement('button'); delBtn.className = 'settings-del-btn'; delBtn.textContent = '🗑';
    delBtn.onclick = () => showInlineConfirm(row, `Delete role "${r.name}"? Removes all its tasks.`, () => { deleteRole(r.id); renderSettings(); });
    row.appendChild(dot); row.appendChild(inp); row.appendChild(saveBtn); row.appendChild(delBtn);
    rolesSection.appendChild(row);
  });
  if (roles.length < MAX_ROLES) {
    const addRow = document.createElement('div'); addRow.className = 'add-role-row';
    const addInp = document.createElement('input'); addInp.className = 'settings-input'; addInp.placeholder = 'New role name…'; addInp.id = 'new-role-input';
    const addBtn = document.createElement('button'); addBtn.className = 'add-role-btn'; addBtn.textContent = '+ Add Role';
    addBtn.onclick = () => {
      const name = addInp.value.trim(); if(!name) return;
      const rs = getRoles(); if(rs.length>=MAX_ROLES) return;
      rs.push({ id:'role_'+Date.now(), name, color: ROLE_COLORS[rs.length%ROLE_COLORS.length] });
      saveRoles(rs); addInp.value=''; renderSettings();
    };
    addInp.addEventListener('keydown', e => { if(e.key==='Enter') addBtn.click(); });
    addRow.appendChild(addInp); addRow.appendChild(addBtn);
    rolesSection.appendChild(addRow);
    const note = document.createElement('div'); note.className = 'role-limit-note'; note.textContent = `${MAX_ROLES - roles.length} role slot(s) remaining`; rolesSection.appendChild(note);
  } else {
    const note = document.createElement('div'); note.className = 'role-limit-note'; note.textContent = `Maximum of ${MAX_ROLES} roles reached`; rolesSection.appendChild(note);
  }
  body.appendChild(rolesSection);
}
 
function deleteBaseCat(catKey) {
  const s = getSettings(); if (!s._deleted) s._deleted = []; if (!s._deleted.includes(catKey)) s._deleted.push(catKey); saveSettings(s);
  Object.keys(localStorage).forEach(k => { if (!k.startsWith('lt_day_')) return; try { const raw = JSON.parse(localStorage.getItem(k)); if (!raw||!(catKey in raw)) return; delete raw[catKey]; localStorage.setItem(k, JSON.stringify(raw)); } catch(e){} });
  saveRecurring(getRecurring().filter(t => t.catKey !== catKey));
}
function deleteCustomCat(catId) {
  saveCustomCats(getCustomCats().filter(c => c.id !== catId));
  Object.keys(localStorage).forEach(k => { if (!k.startsWith('lt_day_')) return; try { const raw = JSON.parse(localStorage.getItem(k)); if (!raw||!(catId in raw)) return; delete raw[catId]; localStorage.setItem(k, JSON.stringify(raw)); } catch(e){} });
  saveRecurring(getRecurring().filter(t => t.catKey !== catId));
}
function deleteRole(roleId) {
  saveRoles(getRoles().filter(r => r.id !== roleId));
  Object.keys(localStorage).forEach(k => { if (!k.startsWith('lt_day_')) return; try { const raw = JSON.parse(localStorage.getItem(k)); if (!raw||!(roleId in raw)) return; delete raw[roleId]; localStorage.setItem(k, JSON.stringify(raw)); } catch(e){} });
  saveRecurring(getRecurring().filter(t => t.catKey !== roleId));
}
 
/* ============================================================
   HELPERS
   ============================================================ */
function getAllCats() {
  const settings = getSettings(); const deleted = settings._deleted || [];
  const base   = BASE_CATS.filter(c => !deleted.includes(c.key)).map(c => ({ key: c.key, label: settings[c.key]||c.label, color: c.color }));
  const custom = getCustomCats().map(c => ({ key: c.id, label: c.name, color: c.color }));
  const roles  = getRoles().map(r => ({ key: r.id, label: r.name, color: r.color }));
  return [...base, ...custom, ...roles];
}
function checkSVG() {
  return `<svg width="10" height="8" viewBox="0 0 10 8"><polyline points="1,4 4,7 9,1" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>`;
}
function hexAlpha(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}
 
/* ============================================================
   INIT
   ============================================================ */
renderDashboard();
</script>
