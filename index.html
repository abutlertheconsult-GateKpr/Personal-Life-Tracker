<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIFE.TRACK</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   CSS VARIABLES — Edit colors, sizes, fonts here
   ============================================================ */
:root {
  /* Background layers */
  --bg:       #0a0a0c;
  --surface:  #111115;
  --surface2: #18181f;
  --surface3: #1f1f28;

  /* Borders */
  --border:  #2a2a35;
  --border2: #35353f;

  /* Text */
  --text:  #e8e8f0;
  --text2: #9090a8;
  --text3: #5a5a70;

  /* ── BASE CATEGORY COLORS ──
     To change a category color, update both the base and -dim/-glow variants.
     Format: --{name}: main hex | --{name}-dim: dark bg | --{name}-glow: transparent overlay */
  --blue:       #3b82f6;
  --blue-dim:   #1e3a5f;
  --blue-glow:  rgba(59,130,246,0.15);

  --gold:       #f59e0b;
  --gold-dim:   #4a3010;
  --gold-glow:  rgba(245,158,11,0.15);

  --slate:      #64748b;
  --slate-dim:  #1e2530;
  --slate-glow: rgba(100,116,139,0.15);

  --green:      #22c55e;
  --green-dim:  #0f3020;
  --green-glow: rgba(34,197,94,0.15);

  --purple:     #a855f7;
  --purple-dim: #2d1a4a;
  --purple-glow:rgba(168,85,247,0.15);

  /* ── ROLE COLORS ──
     Each role slot gets a color from this palette (cycled).
     Add more hex values here if you want a wider palette. */
  --role-palette: #f97316, #06b6d4, #ec4899, #84cc16, #eab308, #14b8a6, #6366f1, #f43f5e, #8b5cf6, #10b981;

  /* Layout */
  --panel-w: 400px;
  --radius:  10px;

  /* Ring circumference for r=22 circle: 2*PI*22 ≈ 138.23 */
  --ring-circ: 138.23;
}

/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ============================================================
   NAV BAR
   ============================================================ */
nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,10,12,0.94);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; height: 56px;
  gap: 10px;
}
.nav-brand {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.5rem; letter-spacing: 0.08em;
  color: var(--text); flex-shrink: 0;
}
.nav-brand span { color: var(--blue); }

/* Nav tabs scroll on mobile */
.nav-tabs {
  display: flex; gap: 4px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none; flex: 1;
}
.nav-tabs::-webkit-scrollbar { display: none; }

.nav-tab {
  padding: 6px 14px; border-radius: 6px;
  border: none; cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem; font-weight: 500;
  color: var(--text2); background: transparent;
  transition: all 0.18s; white-space: nowrap; flex-shrink: 0;
}
.nav-tab:hover { background: var(--surface2); color: var(--text); }
.nav-tab.active { background: var(--surface2); color: var(--text); border: 1px solid var(--border2); }

/* Settings gear button */
.nav-settings-btn {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text2); border-radius: 7px;
  width: 34px; height: 34px; font-size: 1rem;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.15s;
}
.nav-settings-btn:hover { background: var(--surface3); color: var(--text); }

/* ============================================================
   PAGES
   ============================================================ */
.page { display: none; padding: 24px 20px; max-width: 1100px; margin: 0 auto; }
.page.active { display: block; }

/* ============================================================
   DASHBOARD PAGE
   ============================================================ */
.dash-header { margin-bottom: 24px; }
.dash-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.4rem; letter-spacing: 0.06em; line-height: 1;
}
.dash-subtitle {
  color: var(--text3); font-size: 0.82rem; margin-top: 4px;
  font-family: 'JetBrains Mono', monospace;
}

/* Responsive grid — auto-fills columns based on content */
.dash-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}

/* Stat card — base styles */
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-top-width: 2px;     /* top accent line color set dynamically via JS */
  border-radius: var(--radius);
  padding: 18px 16px;
  position: relative; overflow: hidden;
  transition: border-color 0.2s, transform 0.15s;
}
.stat-card:hover { transform: translateY(-1px); }

.stat-label {
  font-size: 0.68rem; font-weight: 600; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--text3);
  margin-bottom: 10px;
  /* Truncate long role names */
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.stat-ring-row { display: flex; align-items: center; gap: 12px; }
.ring-wrap { flex-shrink: 0; }
svg.ring { transform: rotate(-90deg); }
.ring-bg { fill: none; stroke: var(--surface3); stroke-width: 5; }
.ring-fill { fill: none; stroke-width: 5; stroke-linecap: round; transition: stroke-dashoffset 0.7s cubic-bezier(.4,0,.2,1); }

.stat-pct {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2rem; line-height: 1; letter-spacing: 0.04em;
}
.stat-detail { font-size: 0.7rem; color: var(--text3); margin-top: 2px; }

/* Summary strip */
.dash-summary {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 20px;
  display: flex; gap: 20px; flex-wrap: wrap; align-items: center;
}
.sum-item { text-align: center; }
.sum-val { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: var(--text); }
.sum-lbl { font-size: 0.7rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; }
.sum-divider { width: 1px; height: 36px; background: var(--border); flex-shrink: 0; }

/* Section heading used in dashboard for base vs roles split */
.dash-section-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.12em;
  margin: 20px 0 10px;
}

/* ============================================================
   CALENDAR PAGE
   ============================================================ */
.cal-months { display: flex; flex-direction: column; gap: 32px; }

.month-heading {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.6rem; letter-spacing: 0.08em;
  color: var(--text2); margin-bottom: 12px;
  display: flex; align-items: baseline; gap: 10px;
}
.month-heading span { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--text3); }

.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }

.cal-dow {
  text-align: center; font-size: 0.65rem; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text3); padding: 6px 0;
}
.cal-day {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 7px; min-height: 56px; padding: 6px;
  cursor: pointer; transition: border-color 0.15s, background 0.15s, transform 0.1s;
  display: flex; flex-direction: column;
}
.cal-day:hover { border-color: var(--border2); background: var(--surface2); transform: translateY(-1px); }
.cal-day.empty { background: transparent; border-color: transparent; cursor: default; }
.cal-day.empty:hover { transform: none; }
.cal-day.today { border-color: var(--blue); }
.cal-day.today .day-num { color: var(--blue); }
.cal-day.selected { border-color: var(--gold); background: var(--surface2); }

.day-num { font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; font-weight: 600; color: var(--text2); }

.day-dot-row { display: flex; gap: 2px; flex-wrap: wrap; margin-top: 3px; }
.day-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

.day-pct-badge {
  margin-top: auto; font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem; font-weight: 600;
  padding: 2px 5px; border-radius: 4px; align-self: flex-start;
}
.day-pct-badge.high  { background: #0f3020; color: var(--green); }
.day-pct-badge.mid   { background: var(--gold-dim); color: var(--gold); }
.day-pct-badge.low   { background: #2a1010; color: #f87171; }
.day-pct-badge.zero  { background: var(--surface3); color: var(--text3); }

/* ============================================================
   TWO-WEEK VIEW PAGE
   ============================================================ */
.twoweek-header { margin-bottom: 20px; }
.twoweek-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2rem; letter-spacing: 0.06em;
}
.twoweek-sub { font-size: 0.82rem; color: var(--text3); font-family: 'JetBrains Mono', monospace; margin-top: 4px; }

.twoweek-list { display: flex; flex-direction: column; gap: 16px; }

.tw-day-block {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
}
.tw-day-head {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.tw-day-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1rem; letter-spacing: 0.06em;
}
.tw-day-label.today-label { color: var(--blue); }
.tw-day-pct {
  font-family: 'JetBrains Mono', monospace; font-size: 0.72rem;
  color: var(--text3);
}
.tw-day-tasks { padding: 10px 16px; display: flex; flex-direction: column; gap: 6px; }
.tw-empty { font-size: 0.8rem; color: var(--text3); font-style: italic; padding: 8px 0; }

/* Task row reused in two-week view */
.tw-task-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px; border-radius: 7px;
  background: var(--surface2); border: 1px solid var(--border);
  transition: border-color 0.15s;
}
.tw-task-item.done { opacity: 0.5; }
.tw-cat-badge {
  font-size: 0.62rem; font-weight: 600; letter-spacing: 0.06em;
  padding: 2px 6px; border-radius: 4px; flex-shrink: 0;
  text-transform: uppercase;
}
.tw-task-text { flex: 1; font-size: 0.82rem; color: var(--text); }
.tw-task-text.done-text { text-decoration: line-through; color: var(--text3); }
.tw-recur-badge {
  font-size: 0.62rem; color: var(--text3); font-family: 'JetBrains Mono', monospace;
  flex-shrink: 0;
}

/* ============================================================
   SLIDE-OUT SIDE PANEL
   ============================================================ */
.panel-overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.55);
}
.panel-overlay.open { display: block; }

.side-panel {
  position: fixed; top: 0; right: -100%; bottom: 0;
  width: min(var(--panel-w), 100vw); z-index: 201;
  background: var(--surface); border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  transition: right 0.3s cubic-bezier(.4,0,.2,1);
  overflow: hidden;
}
.side-panel.open { right: 0; }

.panel-header {
  padding: 16px 18px 14px; border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; justify-content: space-between;
  flex-shrink: 0;
}
.panel-date {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.5rem; letter-spacing: 0.06em; line-height: 1;
}
.panel-day-name { font-size: 0.75rem; color: var(--text3); margin-top: 2px; font-family: 'JetBrains Mono', monospace; }
.panel-close {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text2); border-radius: 6px; width: 32px; height: 32px;
  font-size: 1.1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.15s;
}
.panel-close:hover { background: var(--surface3); color: var(--text); }

.panel-overall {
  padding: 12px 18px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.overall-label { font-size: 0.7rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
.overall-bar-wrap { background: var(--surface3); border-radius: 4px; height: 8px; overflow: hidden; }
.overall-bar { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--blue), var(--green)); transition: width 0.4s; }
.overall-pct { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: var(--text); margin-top: 5px; }

.panel-cats {
  flex: 1; overflow-y: auto; padding: 12px 18px 20px;
  display: flex; flex-direction: column; gap: 16px;
}
.panel-cats::-webkit-scrollbar { width: 4px; }
.panel-cats::-webkit-scrollbar-track { background: transparent; }
.panel-cats::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

/* Category block inside panel */
.cat-block {}
.cat-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;
}
.cat-title {
  display: flex; align-items: center; gap: 7px;
  font-size: 0.72rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.1em;
}
.cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.cat-pct-pill {
  font-family: 'JetBrains Mono', monospace; font-size: 0.68rem;
  padding: 2px 7px; border-radius: 20px;
}

.task-list { display: flex; flex-direction: column; gap: 6px; }

.task-item {
  display: flex; align-items: flex-start; gap: 8px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 7px; padding: 8px 10px;
  transition: border-color 0.15s;
}
.task-item:hover { border-color: var(--border2); }

.task-cb {
  width: 17px; height: 17px; flex-shrink: 0; margin-top: 1px;
  border: 2px solid var(--border2); border-radius: 4px;
  background: transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.task-cb svg { display: none; }
.task-cb.checked svg { display: block; }

.task-info { flex: 1; min-width: 0; }
.task-text {
  font-size: 0.82rem; color: var(--text); line-height: 1.3;
  word-break: break-word;
}
.task-text.done-text { text-decoration: line-through; color: var(--text3); }
.task-recur-label {
  font-size: 0.65rem; color: var(--text3); font-family: 'JetBrains Mono', monospace;
  margin-top: 2px;
}

.task-del {
  background: transparent; border: none; color: var(--text3);
  cursor: pointer; font-size: 1rem; padding: 2px 4px; border-radius: 4px;
  transition: color 0.15s, background 0.15s; flex-shrink: 0;
}
.task-del:hover { color: #f87171; background: rgba(248,113,113,0.1); }

/* Add task area */
.add-task-area {
  margin-top: 8px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px;
}
.add-task-row { display: flex; gap: 6px; }
.add-task-input {
  flex: 1; background: var(--surface3); border: 1px solid var(--border2);
  border-radius: 6px; padding: 7px 10px;
  color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.82rem;
  outline: none; transition: border-color 0.15s;
}
.add-task-input:focus { border-color: var(--text3); }
.add-task-input::placeholder { color: var(--text3); }
.add-task-btn {
  background: var(--surface3); border: 1px solid var(--border2);
  color: var(--text2); border-radius: 6px; padding: 7px 12px;
  cursor: pointer; font-size: 1rem; font-weight: 600;
  transition: all 0.15s; flex-shrink: 0;
}
.add-task-btn:hover { background: var(--border2); color: var(--text); }

/* Recurrence picker row */
.recur-row {
  display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px;
}
.recur-btn {
  font-size: 0.68rem; font-family: 'JetBrains Mono', monospace;
  padding: 3px 8px; border-radius: 4px;
  border: 1px solid var(--border2); background: transparent;
  color: var(--text3); cursor: pointer; transition: all 0.15s;
  white-space: nowrap;
}
.recur-btn:hover { border-color: var(--text3); color: var(--text2); }
.recur-btn.selected { background: var(--blue-dim); border-color: var(--blue); color: var(--blue); }

/* Custom days picker (shown when Custom is selected) */
.custom-days-row {
  display: none; gap: 4px; flex-wrap: wrap; margin-top: 6px;
}
.custom-days-row.visible { display: flex; }
.day-pick-btn {
  font-size: 0.65rem; font-family: 'JetBrains Mono', monospace;
  padding: 3px 7px; border-radius: 4px;
  border: 1px solid var(--border2); background: transparent;
  color: var(--text3); cursor: pointer; transition: all 0.15s;
}
.day-pick-btn.on { background: var(--purple-dim); border-color: var(--purple); color: var(--purple); }

/* ============================================================
   SETTINGS MODAL
   ============================================================ */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,0.7);
  align-items: center; justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); width: 100%; max-width: 480px;
  max-height: 90vh; overflow-y: auto;
  display: flex; flex-direction: column;
}
.modal::-webkit-scrollbar { width: 4px; }
.modal::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
.modal-header {
  padding: 18px 20px 14px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0; position: sticky; top: 0; background: var(--surface); z-index: 1;
}
.modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 0.06em; }
.modal-body { padding: 18px 20px; display: flex; flex-direction: column; gap: 20px; }

.settings-section-label {
  font-size: 0.7rem; font-weight: 600; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--text3); margin-bottom: 10px;
}
.settings-row {
  display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
}
.settings-color-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.settings-input {
  flex: 1; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 6px; padding: 7px 10px;
  color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.85rem;
  outline: none; transition: border-color 0.15s;
}
.settings-input:focus { border-color: var(--border2); }
.settings-save-btn {
  background: var(--blue-dim); border: 1px solid var(--blue);
  color: var(--blue); border-radius: 6px; padding: 6px 12px;
  font-size: 0.78rem; cursor: pointer; transition: all 0.15s; flex-shrink: 0;
}
.settings-save-btn:hover { background: var(--blue); color: #fff; }
.settings-del-btn {
  background: transparent; border: 1px solid var(--border);
  color: var(--text3); border-radius: 6px; padding: 6px 10px;
  font-size: 0.8rem; cursor: pointer; transition: all 0.15s; flex-shrink: 0;
}
.settings-del-btn:hover { border-color: #f87171; color: #f87171; }

.add-role-row { display: flex; gap: 8px; margin-top: 4px; }
.add-role-btn {
  background: var(--surface3); border: 1px solid var(--border2);
  color: var(--text2); border-radius: 6px; padding: 8px 14px;
  font-family: 'DM Sans', sans-serif; font-size: 0.82rem;
  cursor: pointer; transition: all 0.15s; flex-shrink: 0;
}
.add-role-btn:hover { background: var(--border2); color: var(--text); }
.role-limit-note { font-size: 0.72rem; color: var(--text3); margin-top: 6px; font-family: 'JetBrains Mono', monospace; }

/* ============================================================
   DELETE CONFIRM MODAL (for recurring task deletion)
   ============================================================ */
.confirm-modal {
  display: none; position: fixed; inset: 0; z-index: 400;
  background: rgba(0,0,0,0.75);
  align-items: center; justify-content: center; padding: 20px;
}
.confirm-modal.open { display: flex; }
.confirm-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 24px; max-width: 360px; width: 100%;
}
.confirm-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; letter-spacing: 0.06em; margin-bottom: 8px; }
.confirm-msg { font-size: 0.84rem; color: var(--text2); margin-bottom: 20px; line-height: 1.5; }
.confirm-btns { display: flex; gap: 8px; flex-wrap: wrap; }
.confirm-btn {
  flex: 1; padding: 9px 14px; border-radius: 7px;
  font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 500;
  cursor: pointer; border: 1px solid var(--border); transition: all 0.15s;
  min-width: 100px;
}
.confirm-btn.primary { background: #2a1010; border-color: #f87171; color: #f87171; }
.confirm-btn.primary:hover { background: #f87171; color: #fff; }
.confirm-btn.secondary { background: var(--surface2); color: var(--text2); }
.confirm-btn.secondary:hover { background: var(--surface3); color: var(--text); }
.confirm-btn.cancel { background: transparent; color: var(--text3); }
.confirm-btn.cancel:hover { color: var(--text2); }

/* ============================================================
   RESPONSIVE BREAKPOINTS
   ============================================================ */
@media (max-width: 600px) {
  .dash-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }

<!-- ============================================================
     JAVASCRIPT
     ============================================================ -->
<script>
/* ============================================================
   CONFIG — Edit defaults here
   ============================================================ */

// Base categories: key, default label, color hex.
// To add a new base category: add an entry here, also add to getDefaultDay().
const BASE_CATS = [
  { key: 'blue',   label: 'Personal Promises',  color: '#3b82f6' },
  { key: 'gold',   label: 'Promises to Others', color: '#f59e0b' },
  { key: 'slate',  label: 'Not Important',       color: '#64748b' },
  { key: 'green',  label: 'Health & Wellness',   color: '#22c55e' },
];

// Role color palette — roles cycle through these colors.
// Add more colors here to support more visual variety.
const ROLE_COLORS = [
  '#f97316','#06b6d4','#ec4899','#84cc16',
  '#eab308','#14b8a6','#6366f1','#f43f5e','#8b5cf6','#10b981'
];

// Maximum number of roles allowed
const MAX_ROLES = 10;

// Default role names (first 6 shown immediately)
// To change defaults: edit this array
const DEFAULT_ROLE_NAMES = ['Father','Leader','Son','Partner','Professional','Friend'];

// Recurrence options displayed in the panel
// To add/remove options: edit this array
const RECUR_OPTIONS = [
  { key: 'none',      label: 'Once'      },
  { key: 'daily',     label: 'Daily'     },
  { key: 'weekly',    label: 'Weekly'    },
  { key: 'biweekly',  label: 'Biweekly'  },
  { key: 'monthly',   label: 'Monthly'   },
  { key: 'custom',    label: 'Custom'    },
];

const DOW_LABELS = ['Su','Mo','Tu','We','Th','Fr','Sa'];
const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

/* ============================================================
   STATE
   ============================================================ */

// today at midnight
const today = new Date(); today.setHours(0,0,0,0);

// Active date key for the side panel
let activeDateKey = null;

// Per-panel add-task state: { catKey -> { recur, customDays[] } }
let addState = {};

/* ============================================================
   STORAGE HELPERS
   Keys used in localStorage:
     lt_settings       — category labels (object)
     lt_roles          — role definitions array [{id, name, color}]
     lt_day_{dateKey}  — per-day task data object
     lt_recur          — recurring task templates array
   ============================================================ */

function ls_get(key) { return JSON.parse(localStorage.getItem('lt_' + key) || 'null'); }
function ls_set(key, val) { localStorage.setItem('lt_' + key, JSON.stringify(val)); }

/* ── Settings (category label overrides) ── */
function getSettings() {
  const s = ls_get('settings') || {};
  // defaults
  BASE_CATS.forEach(c => { if (!s[c.key]) s[c.key] = c.label; });
  return s;
}
function saveSettings(s) { ls_set('settings', s); }

/* ── Roles ── */
function getRoles() {
  let r = ls_get('roles');
  if (!r) {
    // Initialize with DEFAULT_ROLE_NAMES
    r = DEFAULT_ROLE_NAMES.map((name, i) => ({
      id: 'role_' + i,
      name,
      color: ROLE_COLORS[i % ROLE_COLORS.length]
    }));
    ls_set('roles', r);
  }
  return r;
}
function saveRoles(r) { ls_set('roles', r); }

/* ── Per-day data ── */
function getDefaultDay() {
  // Base cat keys always present
  const d = {};
  BASE_CATS.forEach(c => { d[c.key] = []; });
  // Role task arrays added dynamically as needed
  return d;
}
function getDay(key) {
  const d = ls_get('day_' + key) || getDefaultDay();
  // Ensure base keys exist (in case BASE_CATS was extended)
  BASE_CATS.forEach(c => { if (!d[c.key]) d[c.key] = []; });
  // Ensure role keys exist
  getRoles().forEach(r => { if (!d[r.id]) d[r.id] = []; });
  return d;
}
function setDay(key, val) { ls_set('day_' + key, val); }

/* ── Recurring task templates ──
   Each template: { id, catKey, text, recur, customDays, startKey }
   recur: 'daily' | 'weekly' | 'biweekly' | 'monthly' | 'custom'
   customDays: [0-6] array for custom DOW selection
   startKey: ISO date string YYYY-MM-DD of first occurrence */
function getRecurring() { return ls_get('recur') || []; }
function saveRecurring(r) { ls_set('recur', r); }

/* ============================================================
   DATE UTILITIES
   ============================================================ */

// Zero-padded YYYY-MM-DD string
function dateKey(y, m, d) {
  return `${y}-${String(m + 1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

// Parse a dateKey back to a Date at midnight
function parseKey(key) {
  const [y, m, d] = key.split('-').map(Number);
  const dt = new Date(y, m - 1, d);
  dt.setHours(0,0,0,0);
  return dt;
}

// Check if a recurring template fires on a given Date
function recurFires(template, dt) {
  const start = parseKey(template.startKey);
  if (dt < start) return false;
  const diffDays = Math.round((dt - start) / 86400000);
  switch (template.recur) {
    case 'daily':    return true;
    case 'weekly':   return diffDays % 7 === 0;
    case 'biweekly': return diffDays % 14 === 0;
    case 'monthly':  return dt.getDate() === start.getDate();
    case 'custom':   return (template.customDays || []).includes(dt.getDay());
    default: return false;
  }
}

// Label for recurrence
function recurLabel(r, customDays) {
  if (r === 'none' || !r) return '';
  if (r === 'custom' && customDays && customDays.length) {
    return '↻ ' + customDays.map(d => DOW_LABELS[d]).join(',');
  }
  return '↻ ' + r.charAt(0).toUpperCase() + r.slice(1);
}

/* ============================================================
   RECURRING TASK PROPAGATION
   Ensures recurring tasks appear in a day's data when that day
   is opened or rendered. Call this before reading getDay().
   ============================================================ */
function propagateRecurring(key) {
  const dt = parseKey(key);
  const templates = getRecurring();
  const data = getDay(key);
  let changed = false;

  templates.forEach(t => {
    if (!recurFires(t, dt)) return;
    // Check if this template already has a task in this day
    const arr = data[t.catKey] || [];
    const exists = arr.some(task => task.recurId === t.id);
    if (!exists) {
      if (!data[t.catKey]) data[t.catKey] = [];
      data[t.catKey].push({
        text: t.text,
        done: false,
        recurId: t.id,    // link back to template
        recur: t.recur,
        customDays: t.customDays || []
      });
      changed = true;
    }
  });

  if (changed) setDay(key, data);
}

/* ============================================================
   DAY TOTALS — used for badges and dashboard
   ============================================================ */
function dayTotals(key) {
  propagateRecurring(key);
  const d = getDay(key);
  let done = 0, total = 0;
  // Base cats
  BASE_CATS.forEach(c => {
    total += (d[c.key] || []).length;
    done  += (d[c.key] || []).filter(t => t.done).length;
  });
  // Roles
  getRoles().forEach(r => {
    total += (d[r.id] || []).length;
    done  += (d[r.id] || []).filter(t => t.done).length;
  });
  return { done, total };
}

/* ============================================================
   NAVIGATION
   ============================================================ */
function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  if (btn) btn.classList.add('active');

  if (id === 'calendar')  buildCalendar();
  if (id === 'dashboard') renderDashboard();
  if (id === 'twoweek')   renderTwoWeek();
}

/* ============================================================
   DASHBOARD
   ============================================================ */
function renderDashboard() {
  const settings = getSettings();
  const roles = getRoles();

  // Date range label
  const endDate = new Date(today.getFullYear(), today.getMonth() + 3, 0);
  document.getElementById('dash-range').textContent =
    `${MONTH_NAMES[today.getMonth()].slice(0,3)} ${today.getFullYear()} → ${MONTH_NAMES[endDate.getMonth()].slice(0,3)} ${endDate.getFullYear()}`;

  // Gather totals across 3 months
  const catTotals = {};
  BASE_CATS.forEach(c => { catTotals[c.key] = { d: 0, t: 0 }; });
  roles.forEach(r => { catTotals[r.id] = { d: 0, t: 0 }; });
  let grandDone = 0, grandTotal = 0, daysLogged = 0;

  for (let mo = 0; mo < 3; mo++) {
    const base = new Date(today.getFullYear(), today.getMonth() + mo, 1);
    const dim  = new Date(base.getFullYear(), base.getMonth() + 1, 0).getDate();
    for (let day = 1; day <= dim; day++) {
      const key = dateKey(base.getFullYear(), base.getMonth(), day);
      propagateRecurring(key);
      const raw = ls_get('day_' + key);
      if (!raw) continue;
      let dayHas = false;
      const allKeys = [
        ...BASE_CATS.map(c => c.key),
        ...roles.map(r => r.id)
      ];
      allKeys.forEach(k => {
        const arr = raw[k] || [];
        if (arr.length > 0) {
          dayHas = true;
          catTotals[k] = catTotals[k] || { d: 0, t: 0 };
          catTotals[k].t += arr.length;
          catTotals[k].d += arr.filter(x => x.done).length;
          grandTotal += arr.length;
          grandDone  += arr.filter(x => x.done).length;
        }
      });
      if (dayHas) daysLogged++;
    }
  }

  // Render base categories grid
  const baseGrid = document.getElementById('dash-base-grid');
  baseGrid.innerHTML = '';
  BASE_CATS.forEach(c => {
    const pct = catTotals[c.key].t > 0
      ? Math.round(catTotals[c.key].d / catTotals[c.key].t * 100) : 0;
    baseGrid.appendChild(makeStatCard(c.key, settings[c.key] || c.label, c.color, pct,
      catTotals[c.key].d, catTotals[c.key].t));
  });

  // Render roles grid
  const rolesGrid = document.getElementById('dash-roles-grid');
  const rolesLabel = document.getElementById('roles-section-label');
  rolesGrid.innerHTML = '';
  if (roles.length > 0) {
    rolesLabel.style.display = 'block';
    roles.forEach(r => {
      const tot = catTotals[r.id] || { d: 0, t: 0 };
      const pct = tot.t > 0 ? Math.round(tot.d / tot.t * 100) : 0;
      rolesGrid.appendChild(makeStatCard(r.id, r.name, r.color, pct, tot.d, tot.t));
    });
  } else {
    rolesLabel.style.display = 'none';
  }

  // Summary strip
  document.getElementById('sum-days-logged').textContent = daysLogged;
  document.getElementById('sum-total-tasks').textContent = grandTotal;
  document.getElementById('sum-completed').textContent   = grandDone;
  document.getElementById('sum-overall').textContent =
    grandTotal > 0 ? Math.round(grandDone / grandTotal * 100) + '%' : '0%';
}

// Build a stat card element
function makeStatCard(key, label, color, pct, done, total) {
  const circ = 138.23;
  const offset = circ - (circ * pct / 100);
  const card = document.createElement('div');
  card.className = 'stat-card';
  card.style.borderTopColor = color;
  card.innerHTML = `
    <div class="stat-label" title="${label}">${label}</div>
    <div class="stat-ring-row">
      <div class="ring-wrap">
        <svg class="ring" width="54" height="54" viewBox="0 0 54 54">
          <circle class="ring-bg" cx="27" cy="27" r="22"/>
          <circle class="ring-fill" cx="27" cy="27" r="22"
            stroke="${color}" stroke-dasharray="${circ}"
            stroke-dashoffset="${offset}"
            style="fill:none;stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset 0.7s cubic-bezier(.4,0,.2,1)"/>
        </svg>
      </div>
      <div>
        <div class="stat-pct" style="color:${color}">${pct}%</div>
        <div class="stat-detail">${done} / ${total} tasks</div>
      </div>
    </div>`;
  return card;
}

/* ============================================================
   CALENDAR BUILD
   Renders 3 months starting from this month
   ============================================================ */
function buildCalendar() {
  const container = document.getElementById('cal-months');
  container.innerHTML = '';
  for (let mo = 0; mo < 3; mo++) {
    const d = new Date(today.getFullYear(), today.getMonth() + mo, 1);
    container.appendChild(buildMonth(d.getFullYear(), d.getMonth()));
  }
}

function buildMonth(y, m) {
  const wrap = document.createElement('div');
  wrap.className = 'month-block';

  const head = document.createElement('div');
  head.className = 'month-heading';
  head.innerHTML = `${MONTH_NAMES[m]} <span>${y}</span>`;
  wrap.appendChild(head);

  const grid = document.createElement('div');
  grid.className = 'cal-grid';

  // Day-of-week headers
  DOW_LABELS.forEach(dl => {
    const el = document.createElement('div');
    el.className = 'cal-dow'; el.textContent = dl;
    grid.appendChild(el);
  });

  // Empty cells before first day
  const firstDow = new Date(y, m, 1).getDay();
  for (let i = 0; i < firstDow; i++) {
    const el = document.createElement('div'); el.className = 'cal-day empty';
    grid.appendChild(el);
  }

  const daysInMonth = new Date(y, m + 1, 0).getDate();
  for (let day = 1; day <= daysInMonth; day++) {
    const key = dateKey(y, m, day);
    const cellDate = new Date(y, m, day); cellDate.setHours(0,0,0,0);
    propagateRecurring(key);

    const cell = document.createElement('div');
    cell.className = 'cal-day';
    if (cellDate.getTime() === today.getTime()) cell.classList.add('today');
    if (cellDate < today) cell.classList.add('past');

    // Day number
    const numEl = document.createElement('div');
    numEl.className = 'day-num'; numEl.textContent = day;
    cell.appendChild(numEl);

    // Colored dots per category with tasks
    const dotRow = document.createElement('div');
    dotRow.className = 'day-dot-row';
    const dayData = getDay(key);
    getAllCats().forEach(c => {
      if ((dayData[c.key] || []).length > 0) {
        const dot = document.createElement('div');
        dot.className = 'day-dot';
        dot.style.background = c.color;
        dotRow.appendChild(dot);
      }
    });
    cell.appendChild(dotRow);

    // % badge for past/today days
    if (cellDate <= today) {
      const { done, total } = dayTotals(key);
      if (total > 0) {
        const pct = Math.round(done / total * 100);
        const badge = document.createElement('div');
        badge.className = 'day-pct-badge ' + (pct >= 80 ? 'high' : pct >= 40 ? 'mid' : 'low');
        badge.textContent = pct + '%';
        cell.appendChild(badge);
      }
    }

    cell.dataset.key = key;
    cell.addEventListener('click', () => openPanel(key, y, m, day));
    grid.appendChild(cell);
  }
  wrap.appendChild(grid);
  return wrap;
}

/* ============================================================
   TWO-WEEK VIEW
   Shows all tasks for today + next 13 days
   ============================================================ */
function renderTwoWeek() {
  const list = document.getElementById('twoweek-list');
  list.innerHTML = '';
  const end = new Date(today); end.setDate(end.getDate() + 13);

  // Update range label
  const fmt = dt => `${MONTH_NAMES[dt.getMonth()].slice(0,3)} ${dt.getDate()}`;
  document.getElementById('twoweek-range').textContent =
    `${fmt(today)} — ${fmt(end)}, ${end.getFullYear()}`;

  for (let i = 0; i < 14; i++) {
    const dt = new Date(today); dt.setDate(dt.getDate() + i);
    const y = dt.getFullYear(), m = dt.getMonth(), d = dt.getDate();
    const key = dateKey(y, m, d);
    propagateRecurring(key);
    const dayData = getDay(key);

    // Collect all tasks across all categories
    const allTasks = [];
    getAllCats().forEach(c => {
      (dayData[c.key] || []).forEach((t, idx) => {
        allTasks.push({ cat: c, task: t, idx });
      });
    });

    const block = document.createElement('div');
    block.className = 'tw-day-block';

    const isToday = dt.getTime() === today.getTime();
    const dow = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][dt.getDay()];
    const { done, total } = dayTotals(key);
    const pct = total > 0 ? Math.round(done / total * 100) : 0;

    const headHTML = `
      <div class="tw-day-head">
        <div class="tw-day-label ${isToday ? 'today-label' : ''}">
          ${isToday ? '★ ' : ''}${dow.toUpperCase()}, ${MONTH_NAMES[m].slice(0,3).toUpperCase()} ${d}
        </div>
        <div class="tw-day-pct">${total > 0 ? pct + '%' : '—'}</div>
      </div>`;
    block.innerHTML = headHTML;

    const taskDiv = document.createElement('div');
    taskDiv.className = 'tw-day-tasks';

    if (allTasks.length === 0) {
      taskDiv.innerHTML = '<div class="tw-empty">No tasks scheduled</div>';
    } else {
      allTasks.forEach(({ cat, task, idx }) => {
        const row = document.createElement('div');
        row.className = 'tw-task-item' + (task.done ? ' done' : '');

        const badge = document.createElement('div');
        badge.className = 'tw-cat-badge';
        badge.style.background = hexAlpha(cat.color, 0.15);
        badge.style.color = cat.color;
        badge.textContent = cat.label.split(' ')[0]; // First word of category

        const txt = document.createElement('div');
        txt.className = 'tw-task-text' + (task.done ? ' done-text' : '');
        txt.textContent = task.text;

        const recLbl = task.recur && task.recur !== 'none'
          ? document.createElement('div') : null;
        if (recLbl) {
          recLbl.className = 'tw-recur-badge';
          recLbl.textContent = recurLabel(task.recur, task.customDays);
        }

        // Checkbox — toggles task and refreshes view
        const cb = document.createElement('div');
        cb.className = 'task-cb' + (task.done ? ' checked' : '');
        cb.style.setProperty('--cb-color', cat.color);
        cb.innerHTML = checkSVG();
        if (task.done) { cb.style.background = cat.color; cb.style.borderColor = cat.color; }
        cb.onclick = () => {
          const data = getDay(key);
          data[cat.key][idx].done = !data[cat.key][idx].done;
          setDay(key, data);
          renderTwoWeek();
          renderDashboard();
        };

        row.appendChild(cb);
        row.appendChild(badge);
        row.appendChild(txt);
        if (recLbl) row.appendChild(recLbl);
        taskDiv.appendChild(row);
      });
    }

    block.appendChild(taskDiv);
    list.appendChild(block);
  }
}

/* ============================================================
   SIDE PANEL
   ============================================================ */
function openPanel(key, y, m, day) {
  activeDateKey = key;
  propagateRecurring(key);

  // Initialize addState for this open session
  addState = {};
  getAllCats().forEach(c => { addState[c.key] = { recur: 'none', customDays: [] }; });

  const dt = new Date(y, m, day);
  const dow = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][dt.getDay()];
  document.getElementById('panel-date-text').textContent =
    `${MONTH_NAMES[m].slice(0,3).toUpperCase()} ${day}, ${y}`;
  document.getElementById('panel-day-name').textContent = dow.toUpperCase();

  renderPanel();

  document.getElementById('overlay').classList.add('open');
  document.getElementById('side-panel').classList.add('open');

  // Highlight selected cell
  document.querySelectorAll('.cal-day').forEach(el => el.classList.remove('selected'));
  const sel = document.querySelector(`[data-key="${key}"]`);
  if (sel) sel.classList.add('selected');
}

function closePanel() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('side-panel').classList.remove('open');
  document.querySelectorAll('.cal-day').forEach(el => el.classList.remove('selected'));
  activeDateKey = null;
}

function renderPanel() {
  if (!activeDateKey) return;
  const data = getDay(activeDateKey);
  const { done, total } = dayTotals(activeDateKey);
  const pct = total > 0 ? Math.round(done / total * 100) : 0;

  document.getElementById('overall-bar').style.width = pct + '%';
  document.getElementById('overall-pct-text').textContent =
    `${done} of ${total} tasks complete — ${pct}%`;

  const container = document.getElementById('panel-cats');
  container.innerHTML = '';

  getAllCats().forEach(cat => {
    const tasks = data[cat.key] || [];
    const catDone = tasks.filter(t => t.done).length;
    const catPct  = tasks.length > 0 ? Math.round(catDone / tasks.length * 100) : 0;

    const block = document.createElement('div');
    block.className = 'cat-block';

    // Category header
    const header = document.createElement('div');
    header.className = 'cat-header';
    header.innerHTML = `
      <div class="cat-title">
        <div class="cat-dot" style="background:${cat.color}"></div>
        ${cat.label}
      </div>
      <div class="cat-pct-pill" style="background:${hexAlpha(cat.color,0.15)};color:${cat.color}">${catPct}%</div>`;
    block.appendChild(header);

    // Task list
    const taskList = document.createElement('div');
    taskList.className = 'task-list';
    tasks.forEach((t, i) => {
      taskList.appendChild(makeTaskEl(cat, t, i));
    });
    block.appendChild(taskList);

    // Add task area
    const addArea = document.createElement('div');
    addArea.className = 'add-task-area';

    // Input row
    const addRow = document.createElement('div');
    addRow.className = 'add-task-row';
    const inp = document.createElement('input');
    inp.className = 'add-task-input';
    inp.placeholder = 'Add task…';
    inp.id = 'inp-' + cat.key;
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(cat.key); });
    const addBtn = document.createElement('button');
    addBtn.className = 'add-task-btn'; addBtn.textContent = '+';
    addBtn.onclick = () => addTask(cat.key);
    addRow.appendChild(inp); addRow.appendChild(addBtn);
    addArea.appendChild(addRow);

    // Recurrence picker
    const recurRow = document.createElement('div');
    recurRow.className = 'recur-row';
    RECUR_OPTIONS.forEach(ro => {
      const btn = document.createElement('button');
      btn.className = 'recur-btn' + (addState[cat.key].recur === ro.key ? ' selected' : '');
      btn.textContent = ro.label;
      btn.dataset.val = ro.key;
      btn.onclick = () => {
        addState[cat.key].recur = ro.key;
        // Refresh just the recur buttons for this cat
        recurRow.querySelectorAll('.recur-btn').forEach(b => {
          b.classList.toggle('selected', b.dataset.val === ro.key);
        });
        // Show/hide custom days
        customRow.classList.toggle('visible', ro.key === 'custom');
      };
      recurRow.appendChild(btn);
    });
    addArea.appendChild(recurRow);

    // Custom day picker (hidden until 'Custom' selected)
    const customRow = document.createElement('div');
    customRow.className = 'custom-days-row';
    DOW_LABELS.forEach((dl, di) => {
      const btn = document.createElement('button');
      btn.className = 'day-pick-btn';
      btn.textContent = dl;
      btn.onclick = () => {
        const st = addState[cat.key];
        if (st.customDays.includes(di)) {
          st.customDays = st.customDays.filter(x => x !== di);
        } else {
          st.customDays.push(di);
        }
        btn.classList.toggle('on', st.customDays.includes(di));
      };
      customRow.appendChild(btn);
    });
    addArea.appendChild(customRow);

    block.appendChild(addArea);
    container.appendChild(block);
  });

  refreshCalCell(activeDateKey);
  renderDashboard();
}

// Build a single task row element in the side panel
function makeTaskEl(cat, task, idx) {
  const item = document.createElement('div');
  item.className = 'task-item' + (task.done ? ' done' : '');

  // Checkbox
  const cb = document.createElement('div');
  cb.className = 'task-cb' + (task.done ? ' checked' : '');
  if (task.done) { cb.style.background = cat.color; cb.style.borderColor = cat.color; }
  cb.innerHTML = checkSVG();
  cb.onclick = () => toggleTask(cat.key, idx);

  // Text + recurrence info
  const info = document.createElement('div');
  info.className = 'task-info';
  const txt = document.createElement('div');
  txt.className = 'task-text' + (task.done ? ' done-text' : '');
  txt.textContent = task.text;
  info.appendChild(txt);
  if (task.recur && task.recur !== 'none') {
    const rl = document.createElement('div');
    rl.className = 'task-recur-label';
    rl.textContent = recurLabel(task.recur, task.customDays);
    info.appendChild(rl);
  }

  // Delete button
  const del = document.createElement('button');
  del.className = 'task-del'; del.textContent = '×';
  del.onclick = () => requestDeleteTask(cat.key, idx, task);

  item.appendChild(cb); item.appendChild(info); item.appendChild(del);
  return item;
}

/* ── Task CRUD ── */

function addTask(catKey) {
  const inp = document.getElementById('inp-' + catKey);
  const text = inp.value.trim();
  if (!text) return;

  const st = addState[catKey];
  const recur  = st.recur;
  const customDays = [...st.customDays];

  const data = getDay(activeDateKey);
  if (!data[catKey]) data[catKey] = [];

  // If recurring, save a template so future days auto-populate
  if (recur !== 'none') {
    const templateId = 'rt_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
    const templates = getRecurring();
    templates.push({ id: templateId, catKey, text, recur, customDays, startKey: activeDateKey });
    saveRecurring(templates);

    data[catKey].push({ text, done: false, recurId: templateId, recur, customDays });
  } else {
    data[catKey].push({ text, done: false, recur: 'none', customDays: [] });
  }

  setDay(activeDateKey, data);
  inp.value = '';
  // Reset recur state for this cat
  addState[catKey] = { recur: 'none', customDays: [] };
  renderPanel();
}

function toggleTask(catKey, idx) {
  const data = getDay(activeDateKey);
  data[catKey][idx].done = !data[catKey][idx].done;
  setDay(activeDateKey, data);
  renderPanel();
}

// If recurring, ask user which scope to delete
function requestDeleteTask(catKey, idx, task) {
  if (task.recurId) {
    // Show confirm modal
    document.getElementById('confirm-title').textContent = 'Delete Recurring Task';
    document.getElementById('confirm-msg').textContent =
      `"${task.text}" repeats ${task.recur}. What would you like to delete?`;
    const btns = document.getElementById('confirm-btns');
    btns.innerHTML = '';

    const b1 = document.createElement('button');
    b1.className = 'confirm-btn secondary'; b1.textContent = 'This day only';
    b1.onclick = () => { deleteTask(catKey, idx, false, task.recurId); closeConfirm(); };

    const b2 = document.createElement('button');
    b2.className = 'confirm-btn primary'; b2.textContent = 'This & all future';
    b2.onclick = () => { deleteTask(catKey, idx, true, task.recurId); closeConfirm(); };

    const b3 = document.createElement('button');
    b3.className = 'confirm-btn cancel'; b3.textContent = 'Cancel';
    b3.onclick = closeConfirm;

    btns.appendChild(b1); btns.appendChild(b2); btns.appendChild(b3);
    document.getElementById('confirm-modal').classList.add('open');
  } else {
    deleteTask(catKey, idx, false, null);
  }
}

function deleteTask(catKey, idx, deleteFuture, recurId) {
  const data = getDay(activeDateKey);
  data[catKey].splice(idx, 1);
  setDay(activeDateKey, data);

  // If deleting all future, remove the recurring template
  if (deleteFuture && recurId) {
    let templates = getRecurring();
    templates = templates.filter(t => t.id !== recurId);
    saveRecurring(templates);
    // Also scrub from already-populated future days
    // (walk forward 90 days and remove matching tasks)
    for (let i = 1; i <= 90; i++) {
      const dt = new Date(today); dt.setDate(today.getDate() + i);
      const fkey = dateKey(dt.getFullYear(), dt.getMonth(), dt.getDate());
      const fdata = ls_get('day_' + fkey);
      if (!fdata) continue;
      let changed = false;
      Object.keys(fdata).forEach(k => {
        const before = fdata[k].length;
        fdata[k] = fdata[k].filter(t => t.recurId !== recurId);
        if (fdata[k].length !== before) changed = true;
      });
      if (changed) ls_set('day_' + fkey, fdata);
    }
  }
  renderPanel();
}

function closeConfirm() {
  document.getElementById('confirm-modal').classList.remove('open');
}

/* ── Calendar cell refresh after panel edits ── */
function refreshCalCell(key) {
  const cell = document.querySelector(`[data-key="${key}"]`);
  if (!cell) return;
  cell.querySelectorAll('.day-pct-badge, .day-dot-row').forEach(el => el.remove());

  const dayData = getDay(key);
  const dotRow = document.createElement('div');
  dotRow.className = 'day-dot-row';
  getAllCats().forEach(c => {
    if ((dayData[c.key] || []).length > 0) {
      const dot = document.createElement('div');
      dot.className = 'day-dot';
      dot.style.background = c.color;
      dotRow.appendChild(dot);
    }
  });
  cell.appendChild(dotRow);

  const cellDate = parseKey(key);
  if (cellDate <= today) {
    const { done, total } = dayTotals(key);
    if (total > 0) {
      const pct = Math.round(done / total * 100);
      const badge = document.createElement('div');
      badge.className = 'day-pct-badge ' + (pct >= 80 ? 'high' : pct >= 40 ? 'mid' : 'low');
      badge.textContent = pct + '%';
      cell.appendChild(badge);
    }
  }
}

/* ============================================================
   SETTINGS MODAL
   ============================================================ */
function openSettings() {
  renderSettings();
  document.getElementById('settings-overlay').classList.add('open');
}
function closeSettings() {
  document.getElementById('settings-overlay').classList.remove('open');
  // Refresh everything to reflect name/deletion changes
  renderDashboard();
  buildCalendar();
}
function maybeCloseSettings(e) {
  if (e.target === document.getElementById('settings-overlay')) closeSettings();
}

function renderSettings() {
  const body = document.getElementById('settings-body');
  body.innerHTML = '';
  const settings = getSettings();
  const roles = getRoles();

  /* ── Base categories section ── */
  const baseSection = document.createElement('div');
  baseSection.innerHTML = '<div class="settings-section-label">Base Categories</div>';

  BASE_CATS.forEach(c => {
    const row = document.createElement('div');
    row.className = 'settings-row';

    const dot = document.createElement('div');
    dot.className = 'settings-color-dot';
    dot.style.background = c.color;

    const inp = document.createElement('input');
    inp.className = 'settings-input';
    inp.value = settings[c.key] || c.label;
    inp.placeholder = c.label;

    const btn = document.createElement('button');
    btn.className = 'settings-save-btn'; btn.textContent = 'Save';
    btn.onclick = () => {
      const s = getSettings();
      s[c.key] = inp.value.trim() || c.label;
      saveSettings(s);
      btn.textContent = '✓'; setTimeout(() => { btn.textContent = 'Save'; }, 1200);
    };

    row.appendChild(dot); row.appendChild(inp); row.appendChild(btn);
    baseSection.appendChild(row);
  });
  body.appendChild(baseSection);

  /* ── Roles section ── */
  const rolesSection = document.createElement('div');
  rolesSection.innerHTML = `<div class="settings-section-label">My Roles (${roles.length}/${MAX_ROLES})</div>`;

  roles.forEach((r, i) => {
    const row = document.createElement('div');
    row.className = 'settings-row';

    const dot = document.createElement('div');
    dot.className = 'settings-color-dot';
    dot.style.background = r.color;

    const inp = document.createElement('input');
    inp.className = 'settings-input';
    inp.value = r.name;
    inp.placeholder = 'Role name';

    // Save name button
    const saveBtn = document.createElement('button');
    saveBtn.className = 'settings-save-btn'; saveBtn.textContent = 'Save';
    saveBtn.onclick = () => {
      const rs = getRoles();
      rs[i].name = inp.value.trim() || r.name;
      saveRoles(rs);
      saveBtn.textContent = '✓'; setTimeout(() => { saveBtn.textContent = 'Save'; }, 1200);
    };

    // Delete role button
    const delBtn = document.createElement('button');
    delBtn.className = 'settings-del-btn'; delBtn.textContent = '🗑';
    delBtn.title = 'Delete this role (removes from all days & dashboard)';
    delBtn.onclick = () => {
      if (!confirm(`Delete role "${r.name}"? This removes it from all days.`)) return;
      deleteRole(r.id);
      renderSettings(); // re-render settings list
    };

    row.appendChild(dot); row.appendChild(inp); row.appendChild(saveBtn); row.appendChild(delBtn);
    rolesSection.appendChild(row);
  });

  // Add role button (shown only if under max)
  if (roles.length < MAX_ROLES) {
    const addRow = document.createElement('div');
    addRow.className = 'add-role-row';
    const addInp = document.createElement('input');
    addInp.className = 'settings-input'; addInp.placeholder = 'New role name…';
    addInp.id = 'new-role-input';
    const addBtn = document.createElement('button');
    addBtn.className = 'add-role-btn'; addBtn.textContent = '+ Add Role';
    addBtn.onclick = () => {
      const name = addInp.value.trim();
      if (!name) return;
      const rs = getRoles();
      if (rs.length >= MAX_ROLES) return;
      rs.push({
        id: 'role_' + Date.now(),
        name,
        color: ROLE_COLORS[rs.length % ROLE_COLORS.length]
      });
      saveRoles(rs);
      addInp.value = '';
      renderSettings();
    };
    addInp.addEventListener('keydown', e => { if (e.key === 'Enter') addBtn.click(); });
    addRow.appendChild(addInp); addRow.appendChild(addBtn);
    rolesSection.appendChild(addRow);
    const note = document.createElement('div');
    note.className = 'role-limit-note';
    note.textContent = `${MAX_ROLES - roles.length} role slot(s) remaining`;
    rolesSection.appendChild(note);
  } else {
    const note = document.createElement('div');
    note.className = 'role-limit-note';
    note.textContent = `Maximum of ${MAX_ROLES} roles reached`;
    rolesSection.appendChild(note);
  }

  body.appendChild(rolesSection);
}

// Permanently delete a role and all its task data
function deleteRole(roleId) {
  let roles = getRoles();
  roles = roles.filter(r => r.id !== roleId);
  saveRoles(roles);

  // Remove role tasks from all stored days
  // Scans localStorage for any lt_day_ keys
  Object.keys(localStorage).forEach(k => {
    if (!k.startsWith('lt_day_')) return;
    const raw = JSON.parse(localStorage.getItem(k));
    if (!raw || !raw[roleId]) return;
    delete raw[roleId];
    localStorage.setItem(k, JSON.stringify(raw));
  });

  // Remove any recurring templates for this role
  let templates = getRecurring();
  templates = templates.filter(t => t.catKey !== roleId);
  saveRecurring(templates);
}

/* ============================================================
   HELPERS
   ============================================================ */

// Returns all active categories (base + roles) in unified format
// { key, label, color }
function getAllCats() {
  const settings = getSettings();
  const base = BASE_CATS.map(c => ({
    key: c.key,
    label: settings[c.key] || c.label,
    color: c.color
  }));
  const roles = getRoles().map(r => ({
    key: r.id,
    label: r.name,
    color: r.color
  }));
  return [...base, ...roles];
}

// SVG checkmark used in checkboxes
function checkSVG() {
  return `<svg width="10" height="8" viewBox="0 0 10 8">
    <polyline points="1,4 4,7 9,1" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
  </svg>`;
}

// Convert hex color to rgba with alpha
function hexAlpha(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

/* ============================================================
   INIT — runs on page load
   ============================================================ */
renderDashboard();
</script>
